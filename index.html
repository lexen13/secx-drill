<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>SecurityX Drill</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SecX Drill">
<meta name="theme-color" content="#0f172a">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:#0f172a;color:#f8fafc;overscroll-behavior:none}
.app{height:100vh;height:100dvh;display:flex;flex-direction:column;padding:env(safe-area-inset-top) 16px env(safe-area-inset-bottom) 16px;max-width:520px;margin:0 auto;overflow-y:auto;-webkit-overflow-scrolling:touch}
.menu{flex:1;display:flex;flex-direction:column;padding-top:16px}
.logo{text-align:center;margin-bottom:18px}
.logo-sub{font-size:11px;letter-spacing:4px;color:#94a3b8;text-transform:uppercase;margin-bottom:3px}
.logo-main{font-size:30px;font-weight:800;letter-spacing:-1px}
.logo-desc{font-size:13px;color:#cbd5e1;margin-top:2px}
.logo-bar{width:50px;height:3px;background:#ef4444;margin:8px auto 0;border-radius:2px}
.stat-row{display:flex;gap:8px;margin-bottom:10px}
.stat-box{flex:1;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:8px;text-align:center}
.stat-num{font-size:18px;font-weight:800}.stat-label{font-size:9px;color:#64748b;margin-top:1px}
.cat-box{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:10px;margin-bottom:8px}
.cat-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.cat-label{color:#e2e8f0;font-size:12px;font-weight:600}
.cat-btns{display:flex;gap:5px}
.cat-btns button{background:none;border:1px solid rgba(255,255,255,0.2);color:#94a3b8;border-radius:6px;padding:2px 8px;font-size:10px;cursor:pointer}
.cat-grid{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:4px}
.cat-tag{border-radius:14px;padding:4px 9px;font-size:10px;cursor:pointer;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:#64748b;transition:all .15s;line-height:1.3}
.cat-tag.active{color:#fff;font-weight:600}
.cat-count{color:#64748b;font-size:10px;margin-top:2px}
.mode-toggle{display:flex;gap:6px;margin-bottom:10px}
.mode-btn{flex:1;padding:10px;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s;-webkit-appearance:none}
.mode-btn.active{background:rgba(239,68,68,0.2);color:#fca5a5;border:1px solid rgba(239,68,68,0.4)}
.mode-btn.inactive{background:rgba(255,255,255,0.05);color:#64748b;border:1px solid rgba(255,255,255,0.1)}
.btn-start{width:100%;padding:14px;background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(239,68,68,0.3);margin-bottom:6px;-webkit-appearance:none}
.btn-start:active{transform:scale(.98)}
.btn-missed{width:100%;padding:11px;background:rgba(239,68,68,0.12);color:#fca5a5;border:1px solid rgba(239,68,68,0.3);border-radius:12px;font-size:11px;font-weight:600;cursor:pointer;margin-bottom:6px;-webkit-appearance:none}
.shortcuts{text-align:center;margin-top:6px;color:#475569;font-size:9px;line-height:1.5}
.shortcuts b{color:#94a3b8}
.study{flex:1;display:flex;flex-direction:column;padding-top:6px}
.study-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;font-size:11px}
.study-header .exit{background:none;border:none;color:#64748b;cursor:pointer;font-size:11px;padding:4px}
.study-header .counter{color:#94a3b8;font-weight:600}
.study-header .scores{display:flex;gap:8px}
.g{color:#4ade80}.r{color:#f87171}
.progress-bar{height:3px;background:rgba(255,255,255,0.1);border-radius:2px;margin-bottom:8px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#ef4444,#f97316);border-radius:2px;transition:width .3s}
.badge{display:inline-block;padding:3px 10px;border-radius:14px;font-size:10px;font-weight:600;color:#fff;margin-bottom:6px}
.card{border-radius:14px;padding:20px 16px;cursor:pointer;display:flex;flex-direction:column;justify-content:center;transition:all .2s;overflow-y:auto;-webkit-overflow-scrolling:touch}
.card.question{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);min-height:100px}
.card.answer{border:1px solid;box-shadow:0 6px 24px rgba(0,0,0,0.2);min-height:80px}
.q-text{font-size:15px;font-weight:600;line-height:1.5;color:#f1f5f9}
.tap-hint{font-size:10px;color:#475569;text-align:center;margin-top:10px}
.a-label{font-size:10px;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.a-text{font-size:13px;line-height:1.6;font-weight:500}
.action-btns{display:flex;gap:8px;margin-top:8px;flex-shrink:0}
.action-btns button{flex:1;padding:12px;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;-webkit-appearance:none}
.action-btns button:active{transform:scale(.97)}
.btn-miss{background:rgba(239,68,68,0.12);color:#fca5a5;border:1px solid rgba(239,68,68,0.25)}
.btn-know{background:rgba(34,197,94,0.12);color:#86efac;border:1px solid rgba(34,197,94,0.25)}
 
/* Quiz mode */
.choices{display:flex;flex-direction:column;gap:6px;margin-top:10px;flex-shrink:0}
.choice{padding:12px 14px;border-radius:10px;font-size:13px;line-height:1.4;cursor:pointer;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.05);color:#e2e8f0;transition:all .15s;-webkit-appearance:none;text-align:left;font-weight:500}
.choice:active{transform:scale(.98)}
.choice.correct{background:rgba(34,197,94,0.15);border-color:#22c55e;color:#86efac}
.choice.wrong{background:rgba(239,68,68,0.15);border-color:#ef4444;color:#fca5a5}
.choice.reveal{background:rgba(34,197,94,0.08);border-color:rgba(34,197,94,0.3);color:#6ee7b7}
.choice.disabled{pointer-events:none;opacity:0.6}
.explanation{margin-top:8px;padding:12px;border-radius:10px;font-size:12px;line-height:1.5;color:#94a3b8;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08)}
.explanation b{color:#e2e8f0}
.btn-next{width:100%;padding:13px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;-webkit-appearance:none;background:rgba(255,255,255,0.08);color:#e2e8f0;border:1px solid rgba(255,255,255,0.15)}
.btn-next:active{transform:scale(.98)}
 
.results{flex:1;display:flex;flex-direction:column;align-items:center;padding-top:20px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.results .emoji{font-size:48px;margin-bottom:4px}
.results .pct{font-size:26px;font-weight:800}
.results .summary{color:#94a3b8;font-size:12px;margin-bottom:14px}
.result-bar{width:100%;height:7px;border-radius:4px;background:rgba(255,255,255,0.1);margin-bottom:16px;overflow:hidden}
.result-bar .fill{height:100%;background:#22c55e;border-radius:4px;transition:width .6s}
.missed-box{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:10px;margin-bottom:10px;text-align:left;max-height:40vh;overflow-y:auto}
.missed-box .mlabel{color:#fca5a5;font-size:11px;font-weight:600;margin-bottom:5px}
.missed-box .mitem{color:#cbd5e1;font-size:10px;margin-bottom:3px;padding-left:6px;border-left:2px solid;line-height:1.3}
.result-btns{display:flex;gap:8px;width:100%;margin-top:4px;padding-bottom:10px}
.result-btns button{flex:1;padding:12px;border-radius:12px;font-size:12px;font-weight:600;cursor:pointer;-webkit-appearance:none}
.result-btns button:active{transform:scale(.97)}
.btn-back{background:rgba(255,255,255,0.08);color:#e2e8f0;border:1px solid rgba(255,255,255,0.15)}
.btn-retry{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;border:none}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
const CARDS=[{"cat": "Architecture", "q": "A fire destroyed your company's main office — unusable for 3 months. Which plan dictates how you respond?", "a": "DRP (Disaster Recovery Plan)", "w": ["BCP (Business Continuity Plan)", "IRP (Incident Response Plan)", "System Life Cycle Plan"], "e": "DRP = resume work AFTER a specific disaster. BCP = broader plan for operating DURING disruption. 'Respond to fire' = DRP."}, {"cat": "Architecture", "q": "Your company needs email restored within 4 hours of an outage. What metric is this?", "a": "RTO (Recovery Time Objective)", "w": ["RPO (Recovery Point Objective)", "MTTR (Mean Time To Repair)", "MTBF (Mean Time Between Failures)"], "e": "RTO = max acceptable TIME to restore. RPO = max data loss. MTTR = avg repair time. MTBF = avg uptime before failure."}, {"cat": "Architecture", "q": "A router ran for 183 days before its power supply failed. What does the 183 days represent?", "a": "MTBF (Mean Time Between Failures)", "w": ["MTTR (Mean Time To Repair)", "RTO (Recovery Time Objective)", "RPO (Recovery Point Objective)"], "e": "MTBF = avg time a device works BEFORE failure. The 4-hour fix = MTTR. Higher MTBF = more reliable."}, {"cat": "Architecture", "q": "$3.125M data center, hurricanes every 20 years, 60% damage. What is the ALE (Annual Loss Expectancy)?", "a": "$93,750", "w": ["$1,875,000", "$625,000", "$156,250"], "e": "SLE = $3.125M × 0.60 = $1,875,000. ARO = 1/20 = 0.05. ALE = $1,875,000 × 0.05 = $93,750."}, {"cat": "Architecture", "q": "Four DLP suppliers: Alpha($1M, 3 FTE), Bravo($1.3M, 4), Charlie($1.7M, 5), Delta($2M, 6). FTEs at $75K/yr over 5 years. Which has the LOWEST ROI?", "a": "Supplier Alpha ($125K savings)", "w": ["Supplier Charlie ($175K savings)", "Supplier Bravo ($200K savings)", "Supplier Delta ($250K savings)"], "e": "Alpha: (3×$75K×5)-$1M = $125K. LOWEST ROI. The question asks for lowest — calculate ALL options, don't guess."}, {"cat": "Architecture", "q": "Cloud app needs more servers during peak. A sysadmin manually approves each new server. What type of scaling?", "a": "Horizontal scaling", "w": ["Vertical scaling", "Autoscaling", "Content delivery network"], "e": "Horizontal = add MORE servers. Not autoscaling (human approves). Vertical = add resources to existing server. CDN = content distribution."}, {"cat": "Architecture", "q": "For max load balancer availability across a global enterprise, which configuration?", "a": "Active-active failover in multiple regions", "w": ["Active-passive configuration", "Single load balancer co-located with primary DC", "Static IP configuration"], "e": "Active-active = zero downtime, routes to nearest operational server. Active-passive = downtime during switch. Single = single point of failure."}, {"cat": "Architecture", "q": "A financial org deploys an IPS but wants to avoid blocking legitimate traffic during initial deployment. Which mode?", "a": "Inline with alert-only policy", "w": ["Bypass mode for critical traffic", "Passive monitoring mode", "Inline with immediate blocking rules"], "e": "Alert-only lets IPS sit inline (needed for future blocking) while only alerting until rules are tuned. Passive can't ever block. Bypass = security gap."}, {"cat": "Architecture", "q": "Your signature-based IDS keeps missing zero-day attacks. What should you switch to?", "a": "Anomaly-based detection", "w": ["Add more signatures to the database", "Deploy additional IDS devices", "Increase the sampling interval"], "e": "Anomaly = baselines normal traffic, catches unknown/zero-day deviations. More signatures only help with KNOWN threats. More devices increase coverage, not detection capability."}, {"cat": "Architecture", "q": "E-commerce platform with high traffic worried about IPS performance degradation. Which detection approach?", "a": "Anomaly-based with threshold adjustments", "w": ["Signature-based for all traffic", "Block all traffic by default, allowlist e-commerce", "Deploy in passive mode"], "e": "Anomaly with thresholds = efficient for dynamic, high-volume environments. Signature matching = performance hit. Passive = can't block. Block-all = disrupts business."}, {"cat": "Architecture", "q": "HTTP allowed on port 80, but attackers tunnel non-HTTP traffic through it. What firewall type stops this?", "a": "Application-aware firewall (NGFW)", "w": ["HTTPS (SSL/TLS)", "Stateful packet inspection", "Stateless packet inspection"], "e": "Application-aware (Layer 7) inspects packet CONTENTS to verify actual protocol. Stateful/stateless only see headers/ports. HTTPS encrypts but doesn't prevent protocol abuse."}, {"cat": "Architecture", "q": "You finished your firewall ACL rules. What should the last rule always be?", "a": "Implicit deny statement", "w": ["Implicit allow statement", "Time of day restriction", "SNMP deny string"], "e": "Implicit deny = anything not explicitly allowed is blocked. Best practice. Implicit allow = terrible security."}, {"cat": "Architecture", "q": "After lateral movement across a flat network, which segmentation strategy best prevents future breaches?", "a": "Micro-segmentation with strict per-workload policies", "w": ["Single VLAN for all systems", "Flat network with IDS monitoring", "All critical systems in one secure zone"], "e": "Micro-seg = tiny isolated segments per workload, stops lateral movement. Single VLAN = still flat. IDS monitors but doesn't prevent. One zone = protects only that zone."}, {"cat": "Architecture", "q": "VPN gives excessive trust after connection. To align with Zero Trust, what should you implement?", "a": "Always-on VPN with user and device verification every session", "w": ["Pre-shared keys for VPN auth", "IP-based rules after VPN auth", "Replace VPN with flat network"], "e": "Zero Trust = 'never trust, always verify.' Continuous user + device verification. Pre-shared keys lack scalability. IP rules are static. Flat network = no security."}, {"cat": "Architecture", "q": "Company wants SDN but won't abandon existing physical network devices. Which SDN approach?", "a": "Hybrid SDN", "w": ["SDN Overlay", "Open SDN", "Peering SDN"], "e": "Hybrid = traditional + SDN in same environment, keeps existing hardware managed. Overlay virtualizes on top, removes direct management. Open = open-source. Peering SDN doesn't exist."}, {"cat": "Architecture", "q": "Multinational needs secure, dynamic traffic management integrating with cloud security tools for a deperimeterized network.", "a": "SD-WAN (Software-Defined WAN)", "w": ["Dynamic routing protocol", "Firewalls at each branch", "Dedicated leased lines"], "e": "SD-WAN = software-based, dynamic routing + cloud security integration. Routing protocols lack security integration. Firewalls/leased lines are less flexible."}, {"cat": "Architecture", "q": "Instant access to servers and switches, provisioned over the internet. Which cloud model?", "a": "IaaS (Infrastructure as a Service)", "w": ["PaaS (Platform as a Service)", "SaaS (Software as a Service)", "DaaS (Desktop as a Service)"], "e": "IaaS = raw infrastructure on demand. PaaS = managed platform (Heroku). SaaS = full app (Gmail). DaaS = virtual desktops."}, {"cat": "Architecture", "q": "CIO proposes migrating all server images to cloud after data breaches. What's the flaw?", "a": "Only changes location, not the attack surface", "w": ["On-site admins provide better security", "Physical servers have unrealized ROI", "This is a reasonable approach"], "e": "Poor security on-prem = poor security in cloud. Must fix root causes first. Moving images doesn't fix underlying vulnerabilities."}, {"cat": "Architecture", "q": "Which connects branch offices to a cloud VPC via IPSec site-to-site?", "a": "VPN gateway", "w": ["API gateway", "NAT gateway", "XML gateway"], "e": "VPN gateway bridges remote sites to cloud VPC. API gateway = API functions. NAT gateway = internet for private subnets. XML gateway = XML filtering."}, {"cat": "Architecture", "q": "Type 1 vs Type 2 hypervisor — which is MORE secure?", "a": "Type 1 (bare metal — ESXi, Hyper-V)", "w": ["Type 2 (VirtualBox, VMware Workstation)", "They have equal security", "Depends on the guest OS"], "e": "Type 1 runs directly on hardware — no host OS to attack. Type 2 runs on a host OS, inheriting its vulnerabilities."}, {"cat": "Architecture", "q": "Attacker breaks out of a VM to access the hypervisor and other VMs. What attack?", "a": "VM Escape", "w": ["VM Sprawl", "Container Breakout", "Privilege Escalation"], "e": "VM Escape = breaking VM isolation to reach host/other VMs. VM Sprawl = uncontrolled VM proliferation. Container Breakout = similar but for containers."}, {"cat": "Architecture", "q": "Security tool between users and SaaS applications enforcing DLP, access control, and shadow IT discovery?", "a": "CASB (Cloud Access Security Broker)", "w": ["WAF (Web Application Firewall)", "SIEM (Security Information & Event Mgmt)", "Reverse Proxy"], "e": "CASB = gatekeeper for cloud apps. WAF = web app protection. SIEM = log correlation. Reverse proxy = sits in front of servers."}, {"cat": "Architecture", "q": "Spoofed emails from your domain. Which 3 DNS-based protocols to implement? (Pick the set of 3)", "a": "SPF, DKIM, DMARC", "w": ["DNSSEC, DoH, DoT", "TLS, IPSec, SSH", "RADIUS, TACACS+, Kerberos"], "e": "SPF = authorized senders. DKIM = email signature. DMARC = policy for failures. DNSSEC/DoH/DoT = DNS security, not email auth."}, {"cat": "Architecture", "q": "What does DNSSEC protect against?", "a": "DNS spoofing / cache poisoning", "w": ["Eavesdropping on DNS queries", "DDoS attacks on DNS servers", "DNS zone transfer attacks"], "e": "DNSSEC = digital signatures on DNS records, proves authenticity. Does NOT encrypt queries (that's DoH/DoT). Does NOT prevent DDoS."}, {"cat": "Architecture", "q": "Main security improvement of WPA3 over WPA2?", "a": "SAE prevents offline dictionary attacks", "w": ["Longer encryption keys", "Mandatory MAC filtering", "Built-in VPN tunneling"], "e": "SAE (Simultaneous Authentication of Equals) replaces vulnerable 4-way handshake. Also adds forward secrecy and OWE for open networks."}, {"cat": "Architecture", "q": "Company needs a backup site. Hot is too expensive, cold takes too long. What's the middle ground?", "a": "Warm site", "w": ["Mobile site", "Virtual site", "Mirror site"], "e": "Warm = hardware installed, needs data restored, hours to activate. Hot = fully running (minutes, expensive). Cold = empty facility (days, cheap)."}, {"cat": "Architecture", "q": "Verify identity AND prevent tailgating into the server room. Which two controls?", "a": "Biometric reader + access control vestibule (mantrap)", "w": ["Biometric at facility + proximity card at DC", "Security guard + keypad", "CCTV + proximity reader"], "e": "Biometric = verifies IDENTITY (not just card possession). Vestibule = prevents tailgating (one person at a time). Proximity cards verify the CARD, not the person."}, {"cat": "Architecture", "q": "What's the difference between a forward proxy and a reverse proxy?", "a": "Forward = between users and internet; Reverse = between internet and your servers", "w": ["Forward = for servers; Reverse = for users", "Forward = encrypted; Reverse = unencrypted", "Forward = Layer 7; Reverse = Layer 4"], "e": "Forward proxy hides CLIENT identity (users → proxy → internet). Reverse proxy hides SERVER identity (internet → proxy → servers). Reverse = load balancing, SSL termination."}, {"cat": "Architecture", "q": "In the IaaS shared responsibility model, who patches the guest OS — you or the provider?", "a": "You (the customer)", "w": ["The cloud provider", "Shared responsibility equally", "Depends on the SLA"], "e": "IaaS: provider manages hardware/networking/virtualization. YOU manage OS, apps, data — including patching. SaaS: provider manages everything."}, {"cat": "Architecture", "q": "What defines how much bandwidth various protocols can use on the network?", "a": "Traffic shaping", "w": ["Load balancing", "High availability", "Fault tolerance"], "e": "Traffic shaping = bandwidth allocation per protocol/user. Load balancing = distributing requests. HA = eliminating single points of failure. Fault tolerance = surviving component failure."}, {"cat": "SecOps", "q": "Name the correct order of the Lockheed Martin Cyber Kill Chain.", "a": "Recon → Weaponize → Deliver → Exploit → Install → C2 → Actions", "w": ["Recon → Deliver → Exploit → Weaponize → Install → C2 → Actions", "Recon → Weaponize → Exploit → Deliver → Install → Actions → C2", "Deliver → Recon → Weaponize → Exploit → Install → C2 → Actions"], "e": "The weapon is BUILT (weaponized) before DELIVERED. Exploitation happens after delivery. C2 comes before final actions. Breaking ANY stage disrupts the kill chain."}, {"cat": "SecOps", "q": "Which framework maps adversary tactics and techniques into a matrix with phases like Initial Access, Persistence, Lateral Movement?", "a": "MITRE ATT&CK", "w": ["Lockheed Martin Cyber Kill Chain", "Diamond Model", "NIST Cybersecurity Framework"], "e": "ATT&CK = tactics (WHY) + techniques (HOW) matrix. Kill Chain = 7-stage linear attack model. Diamond = adversary/capability/infrastructure/victim. NIST CSF = broad security framework."}, {"cat": "SecOps", "q": "The Diamond Model of Intrusion Analysis has 4 core features. Which set?", "a": "Adversary, Capability, Infrastructure, Victim", "w": ["Attacker, Vulnerability, Exploit, Target", "Source, Method, Channel, Destination", "Actor, Tool, Technique, Impact"], "e": "Diamond's 4 corners: Adversary (who), Capability (what tools/malware), Infrastructure (C2 servers, domains), Victim (target). Used to correlate threat intel."}, {"cat": "SecOps", "q": "Correct order of the NIST Incident Response lifecycle?", "a": "Preparation → Detection → Containment → Eradication → Recovery → Lessons Learned", "w": ["Detection → Preparation → Containment → Recovery → Eradication → Lessons", "Preparation → Containment → Detection → Eradication → Recovery → Lessons", "Preparation → Detection → Eradication → Containment → Recovery → Lessons"], "e": "Detect BEFORE contain. Contain BEFORE eradicate. Eradicate BEFORE recover. Always end with lessons learned."}, {"cat": "SecOps", "q": "You need to stop an attacker from spreading while preserving evidence. Which IR phase?", "a": "Containment", "w": ["Eradication", "Detection & Analysis", "Recovery"], "e": "Containment = limit damage + preserve evidence. Eradication = remove the threat (comes after). Detection = finding the incident. Recovery = restoring systems."}, {"cat": "SecOps", "q": "Discussion-based walkthrough of an incident scenario around a table, no real systems involved. What type of exercise?", "a": "Tabletop exercise", "w": ["Full-scale exercise", "Functional exercise", "Penetration test"], "e": "Tabletop = discussion only, cheapest. Functional = simulated with actual procedures. Full-scale = live, real systems, most expensive."}, {"cat": "SecOps", "q": "In digital forensics, what should you capture FIRST when collecting evidence from a live system?", "a": "CPU registers and RAM (most volatile)", "w": ["Hard disk contents", "Remote server logs", "Backup tapes"], "e": "Order of volatility: CPU/RAM (gone at power-off) → swap → disk → remote logs → backups. Capture the MOST volatile first. RAM disappears immediately."}, {"cat": "SecOps", "q": "Why must you use a write blocker during forensic drive imaging?", "a": "Prevents any modification to original evidence", "w": ["Speeds up the imaging process", "Encrypts the forensic copy", "Compresses the drive contents"], "e": "Write blocker = prevents writes to evidence drive. Without it, connecting the drive alters timestamps/data, contaminating evidence and breaking chain of custody."}, {"cat": "SecOps", "q": "Website defaced with 'Killers of the Arctic' targeting an oil company's drilling project. Which threat actor?", "a": "Hacktivist", "w": ["APT (Advanced Persistent Threat)", "Organized crime", "Script kiddie"], "e": "Political/environmental message = hacktivist. APT = nation-state, long-term. Organized crime = money. Script kiddie = unskilled. The political message is the giveaway."}, {"cat": "SecOps", "q": "Fired employee's account never deactivated, credentials used to breach network. What threat category?", "a": "Insider threat", "w": ["Advanced persistent threat", "Zero-day exploit", "Known threat"], "e": "Insider = current/former employee with authorized access. The ONLY threat type that can be 'inadvertent.' APTs and organized crime are always deliberate."}, {"cat": "SecOps", "q": "Which threat actor is typically nation-state backed, long-term, and uses sophisticated custom malware?", "a": "APT (Advanced Persistent Threat)", "w": ["Hacktivist", "Script kiddie", "Insider threat"], "e": "APT = 'Advanced' (sophisticated), 'Persistent' (long-term), nation-state resources. Examples: APT28, APT41. Hacktivists have a cause. Script kiddies lack skill."}, {"cat": "SecOps", "q": "Suspicious files on a potentially compromised server. How to quickly check for malware?", "a": "Submit to VirusTotal (external OSINT)", "w": ["Scan with local anti-virus engine", "Run Strings tool on each file", "Disassemble with IDA Pro"], "e": "NEVER trust local tools on a compromised system — AV may also be compromised. VirusTotal uses 60+ external AV engines. Strings and IDA work but are slower and require expertise."}, {"cat": "SecOps", "q": "Your SIEM correlates outbound traffic spikes with failed logins from an external IP. What makes SIEM valuable?", "a": "Centralized visibility and log correlation", "w": ["Automated remediation of threats", "Blocking the external IP range", "Encrypting logs for compliance"], "e": "SIEM = centralized log collection + correlation. Doesn't block (that's IPS/firewall), doesn't automate response (that's SOAR), doesn't encrypt logs."}, {"cat": "SecOps", "q": "What automates incident response workflows with playbooks, integrating with your SIEM to take action on alerts?", "a": "SOAR (Security Orchestration, Automation & Response)", "w": ["SIEM (Security Info & Event Mgmt)", "EDR (Endpoint Detection & Response)", "UEBA (User & Entity Behavior Analytics)"], "e": "SOAR = automated response playbooks. SIEM = visibility/correlation. EDR = endpoint behavioral detection. UEBA = user behavior baselines."}, {"cat": "SecOps", "q": "What uses ML to build baselines of normal user behavior and flags anomalous deviations?", "a": "UEBA (User & Entity Behavior Analytics)", "w": ["HIDS (Host-based IDS)", "SIEM (Security Info & Event Mgmt)", "DLP (Data Loss Prevention)"], "e": "UEBA = ML baselines + user behavior anomaly detection. HIDS = signature-based on hosts. SIEM = log correlation. DLP = data exfiltration prevention."}, {"cat": "SecOps", "q": "EDR monitors endpoints. What extends detection across endpoints + network + cloud + email in one platform?", "a": "XDR (Extended Detection & Response)", "w": ["SIEM (Security Info & Event Mgmt)", "SOAR (Security Orchestration)", "MDR (Managed Detection & Response)"], "e": "XDR = EDR expanded across MULTIPLE layers, unified correlation. SIEM = log aggregation. SOAR = automated response. MDR = outsourced detection service."}, {"cat": "SecOps", "q": "What does a CVSS score of 9.8 indicate?", "a": "Critical severity — patch immediately", "w": ["Medium severity — schedule for next cycle", "High severity — patch within 30 days", "Low severity — monitor only"], "e": "CVSS 0-3.9=Low, 4-6.9=Medium, 7-8.9=High, 9-10=CRITICAL. 9.8 = remotely exploitable, no auth needed, full compromise. Patch NOW."}, {"cat": "SecOps", "q": "What are STIX and TAXII used for?", "a": "Standardized threat intelligence format (STIX) and transport protocol (TAXII)", "w": ["Encryption algorithms for secure communication", "Vulnerability scoring and prioritization", "Incident response playbook automation"], "e": "STIX = FORMAT for threat data (IoCs, TTPs). TAXII = TRANSPORT protocol for sharing STIX. STIX = what data looks like. TAXII = how it's delivered."}, {"cat": "SecOps", "q": "Team converts ransomware binary to readable code to analyze encryption routine and C2 communication. What technique?", "a": "Disassembly", "w": ["Behavioral analysis", "Dynamic analysis", "Sandboxing"], "e": "Disassembly = binary → readable code WITHOUT running. Dynamic = run and observe. Behavioral = monitor system changes. Sandbox = isolated environment. 'Analyze the code' = disassembly."}, {"cat": "SecOps", "q": "Game exploit buys 1 life, modifies config to show 100 BEFORE app reads it. What vulnerability?", "a": "Race condition", "w": ["Sensitive data exposure", "Broken authentication", "Dereferencing"], "e": "Race condition = outcome depends on TIMING. The exploit RACES to modify before the app reads. Keywords: 'before', 'between', 'while.' Sensitive data exposure = data readable without controls."}, {"cat": "SecOps", "q": "XML contains <!ENTITY abc SYSTEM 'file:///etc/passwd'>. What attack?", "a": "XXE (XML External Entity)", "w": ["SQL injection", "Cross-site scripting (XSS)", "LDAP injection"], "e": "XXE = malicious XML entity references local files. Look for ENTITY + SYSTEM + file:///. Fix: disable DTD processing. SQLi = database. XSS = browser scripts."}, {"cat": "SecOps", "q": "Phishing links bypass security suite. Should you block the IP in the firewall or add the domain to the content filter?", "a": "Add domain to content filter / web proxy block list", "w": ["Block IP in firewall ACL", "Enable TLS on the mail server", "Forward the phishing email to all employees as a warning"], "e": "Domain blocking > IP blocking — attackers change IPs but domains persist. TLS encrypts but doesn't block. Forwarding phishing emails = more people clicking the link."}, {"cat": "SecOps", "q": "Newly discovered software flaw unknown to the vendor, no patch available. What is this?", "a": "Zero-day vulnerability", "w": ["Input validation flaw", "HTTP header injection", "Time-to-check to time-to-use flaw"], "e": "Zero-day = unknown to vendor, unpatched. Once disclosed or patched, no longer zero-day."}, {"cat": "SecOps", "q": "You want to collect attacker payloads without risking production systems. What do you deploy?", "a": "Honeypot", "w": ["Sandbox", "Jumpbox", "Container"], "e": "Honeypot = DECOY to LURE attackers. Sandbox = isolated analysis environment. Jumpbox = secure entry point. Container = lightweight app isolation. Honeypot attracts. Sandbox contains."}, {"cat": "SecOps", "q": "Which is NOT an account-based IoC (Indicator of Compromise): off-hours usage, malicious processes, failed logins, unauthorized sessions?", "a": "Malicious processes (host-based IoC)", "w": ["Off-hours usage", "Failed logins", "Unauthorized sessions"], "e": "Processes = HOST-based (system-level). Account-based = login/session/usage activity. 'Process' = host. 'Login/session' = account."}, {"cat": "SecOps", "q": "To find Domain Controllers via DNS, which TWO service protocols do you query?", "a": "LDAP + Kerberos", "w": ["LDAP + SMTP", "Kerberos + NTLM", "SMTP + LANMAN"], "e": "DCs = LDAP (directory, port 389) + Kerberos (auth, port 88). SMTP = email. NTLM/LANMAN = legacy, not standard SRV lookups."}, {"cat": "SecOps", "q": "Highly tailored phishing emails referencing specific employee roles and projects, created using AI tools. What type of attack?", "a": "Social engineering leveraging AI-based customization", "w": ["Deepfake-assisted phishing", "Automated exploit crafting", "AI-driven pipeline manipulation"], "e": "AI-enhanced spear phishing. AI analyzes public info for personalization. Deepfakes = fabricated media. Exploit crafting = technical vulns. Pipeline manipulation = internal AI workflow attacks."}, {"cat": "SecOps", "q": "Attacker tries thousands of username/password pairs from a breached database against your login. What attack?", "a": "Credential stuffing", "w": ["Brute force", "Password spraying", "Dictionary attack"], "e": "Credential stuffing = leaked creds from OTHER breaches, bets on password reuse. Brute force = all combos. Password spraying = one password across many accounts. Dictionary = common words."}, {"cat": "SecOps", "q": "Forum chatter about an exploit targeting your software stack. Most effective OSINT response?", "a": "Cross-reference with internal systems to identify vulnerabilities", "w": ["Share the post with stakeholders and monitor", "Block all IPs mentioned in the forum", "Report to law enforcement and wait"], "e": "Use OSINT to ACT — check if you're vulnerable and take preventive action. Don't just share (no mitigation). Don't blindly block (too broad). Don't wait (delays action)."}, {"cat": "Engineering", "q": "Access controlled by classification labels (Secret, Top Secret). Users cannot override. Which model?", "a": "MAC (Mandatory Access Control) — strongest", "w": ["RBAC (Role-Based Access Control)", "DAC (Discretionary Access Control)", "ABAC (Attribute-Based Access Control)"], "e": "MAC = system-enforced labels, STRONGEST. Ranking: MAC > RBAC > DAC. ABAC = most flexible. 'Strongest' on the exam = MAC, always."}, {"cat": "Engineering", "q": "Users assigned to 'HR' and 'Finance' groups with permissions. Can't modify own access. Which model?", "a": "RBAC (Role-Based Access Control)", "w": ["MAC (Mandatory Access Control)", "DAC (Discretionary Access Control)", "ABAC (Attribute-Based Access Control)"], "e": "RBAC = roles determine permissions, non-discretionary. MAC = labels. DAC = owner controls (weakest). ABAC = attributes/conditions."}, {"cat": "Engineering", "q": "Access granted only when dept=HR AND time=business_hours AND location=office. Which model?", "a": "ABAC (Attribute-Based Access Control)", "w": ["RBAC (Role-Based Access Control)", "MAC (Mandatory Access Control)", "DAC (Discretionary Access Control)"], "e": "ABAC = multiple attributes (user, resource, environment). Most FLEXIBLE. RBAC = roles only. MAC = labels only."}, {"cat": "Engineering", "q": "Which access control provides the STRONGEST level of protection?", "a": "MAC (Mandatory Access Control)", "w": ["RBAC (Role-Based Access Control)", "DAC (Discretionary Access Control)", "ABAC (Attribute-Based Access Control)"], "e": "MAC > RBAC > DAC in strength. MAC uses classification labels enforced by the system. Users cannot override. Military/classified environments."}, {"cat": "Engineering", "q": "One-time password via token that does NOT expire — valid until used. Which mechanism?", "a": "HOTP (HMAC-based One-Time Password)", "w": ["TOTP (Time-based One-Time Password)", "EAP (Extensible Authentication Protocol)", "Smart card"], "e": "HOTP = counter-based, no expiry. TOTP = time-based, expires every 30-60 sec. EAP = auth framework, not a password type. H = Holds forever. T = Time Ticks."}, {"cat": "Engineering", "q": "What framework lets apps access your data WITHOUT sharing your password, using tokens instead?", "a": "OAuth (Open Authorization)", "w": ["SAML (Security Assertion Markup Language)", "RADIUS", "Kerberos"], "e": "OAuth = AUTHORIZATION (what can this app access?). Not authentication. SAML = SSO/identity. RADIUS = network auth. Kerberos = Windows domain auth."}, {"cat": "Engineering", "q": "RADIUS vs TACACS+: which encrypts the ENTIRE packet?", "a": "TACACS+", "w": ["RADIUS", "Both encrypt equally", "Neither encrypts"], "e": "TACACS+ = full packet encryption, TCP, Cisco-favored. RADIUS = password only, UDP. 'Full encryption' = TACACS+."}, {"cat": "Engineering", "q": "Pen tester fails NAC health check in a conference room. Best bypass method?", "a": "Spoof the MAC address of a VoIP phone", "w": ["Perform remote code execution on the NAC", "Harvest employee credentials", "DoS attack on the network policy server"], "e": "VoIP/printer MAC spoofing works because these devices can't do NAC and are often allowlisted. Also: try IPv6 or rogue wireless AP."}, {"cat": "Engineering", "q": "Endpoint security creating alerts from SIGNATURE RULES matching KNOWN malicious activity. Which tool?", "a": "HIDS (Host-based Intrusion Detection System)", "w": ["EDR (Endpoint Detection & Response)", "Host-based firewall", "UEBA (User & Entity Behavior Analytics)"], "e": "HIDS = signature rules, KNOWN threats, alerts only. EDR = behavioral/ML, UNKNOWN threats. UEBA = user behavior baselines. 'Signature rules' = HIDS."}, {"cat": "Engineering", "q": "DLP alert on files matching the SSN format (xxx-xx-xxxx). Which DLP detection method?", "a": "Exact data match", "w": ["Document matching", "Statistical matching", "Classification"], "e": "EDM = pattern matching on data FORMAT. Document = whole/partial doc signatures. Statistical = ML analysis. Classification = labels/tags."}, {"cat": "Engineering", "q": "Escape room needs custom programmable logic for each door/window during installation. Which OT?", "a": "FPGA (Field Programmable Gate Array)", "w": ["IoT (Internet of Things)", "ASIC (Application-Specific Integrated Circuit)", "SoC (System on a Chip)"], "e": "FPGA = customer programs AFTER manufacture. ASIC = fixed at manufacture. IoT = networked smart devices (Zigbee). SoC = all-in-one chip (phones)."}, {"cat": "Engineering", "q": "Hub/control system using Zigbee for lights, HVAC, and power devices. What technology type?", "a": "IoT (Internet of Things)", "w": ["FPGA (Field Programmable Gate Array)", "ASIC (Application-Specific Integrated Circuit)", "SoC (System on a Chip)"], "e": "IoT = smart devices via Zigbee/Z-Wave. FPGA = custom logic. ASIC = fixed chips. SoC = computer-on-a-chip."}, {"cat": "Engineering", "q": "After ransomware modified IoT firmware, what should future devices have to prevent unauthorized firmware?", "a": "Hardware root of trust (TPM)", "w": ["Replace with new hardware", "Factory reset and update firmware", "Disable IoT in production"], "e": "TPM = verifies firmware integrity during secure boot. Only validated firmware runs. Replacement alone doesn't fix the vulnerability. Factory reset won't help if devices are unrecoverable."}, {"cat": "Engineering", "q": "What's the difference between TPM and HSM?", "a": "TPM = chip on motherboard; HSM = dedicated external device for enterprise key management", "w": ["TPM = software; HSM = hardware", "TPM = for servers; HSM = for endpoints", "They are the same thing"], "e": "TPM = built-in chip, secure boot + key storage. HSM = standalone enterprise device, high-performance crypto ops, FIPS-validated. TPM = built-in. HSM = dedicated."}, {"cat": "Engineering", "q": "Need to verify a file wasn't altered but DON'T need to prove who created it. Which technique?", "a": "Hashing", "w": ["Digital signature", "Code signing", "Symmetric encryption"], "e": "Hashing = unique digest, INTEGRITY only. Digital sig = integrity + auth + non-repudiation. Code signing = software-specific. Encryption = confidentiality, not integrity."}, {"cat": "Engineering", "q": "Company needs to verify contracts weren't altered AND prove sender identity for legal non-repudiation.", "a": "Digital signatures", "w": ["Hashing", "Key stretching", "Symmetric encryption"], "e": "Digital sig = integrity + authentication + NON-REPUDIATION. Hashing = integrity only. Key stretching = strengthens passwords. Symmetric encryption = confidentiality only."}, {"cat": "Engineering", "q": "App submitted to App Store with publisher certificate. Device checks hash on download. What certificate use case?", "a": "Code signing", "w": ["Digital signature", "Client authentication", "Server authentication"], "e": "Code signing = digital sig on SOFTWARE specifically. Exam wants MOST SPECIFIC answer. Software distribution + publisher cert = code signing."}, {"cat": "Engineering", "q": "Same security as RSA but with much smaller key sizes. Which algorithm?", "a": "ECDSA (Elliptic Curve Digital Signature Algorithm)", "w": ["DSA (Digital Signature Algorithm)", "ChaCha", "Salsa20"], "e": "ECDSA = elliptic curves, 256-bit ≈ 3072-bit RSA. DSA = logarithmic math, not smaller keys. ChaCha/Salsa20 = symmetric stream ciphers, not asymmetric."}, {"cat": "Engineering", "q": "Public ledger of transactional records secured using cryptographic methods. Which technology?", "a": "Blockchain", "w": ["Homomorphic encryption", "Big data", "Machine learning"], "e": "Blockchain = public ledger + transactions + crypto. Homomorphic = compute on encrypted data. Big data = large datasets. ML = pattern learning. 'Public ledger' = blockchain."}, {"cat": "Engineering", "q": "Real-time check on whether a specific certificate has been revoked. CRL or OCSP?", "a": "OCSP (Online Certificate Status Protocol)", "w": ["CRL (Certificate Revocation List)", "Certificate pinning", "HSTS (HTTP Strict Transport Security)"], "e": "OCSP = real-time query for ONE cert (fast, current). CRL = downloadable list of ALL revoked certs (can be stale). OCSP preferred for speed."}, {"cat": "Engineering", "q": "If a server's private key is stolen, previously recorded sessions STILL can't be decrypted. What ensures this?", "a": "Perfect Forward Secrecy (PFS)", "w": ["Key escrow", "Certificate pinning", "Key rotation"], "e": "PFS = each session uses unique ephemeral keys (Diffie-Hellman). Stolen long-term key can't decrypt past sessions. Without PFS, captured traffic could be retroactively decrypted."}, {"cat": "Engineering", "q": "IPSec: which mode encrypts the ENTIRE packet including headers?", "a": "Tunnel mode", "w": ["Transport mode", "AH (Authentication Header)", "ESP only in transport"], "e": "Tunnel = encrypts entire packet + new headers. Site-to-site VPNs. Transport = encrypts payload only, end-to-end between hosts."}, {"cat": "Engineering", "q": "IPSec: which protocol provides encryption — AH or ESP?", "a": "ESP (Encapsulating Security Payload)", "w": ["AH (Authentication Header)", "Both provide encryption", "Neither provides encryption"], "e": "ESP = auth + integrity + ENCRYPTION. AH = auth + integrity only (NO encryption). ESP is far more common."}, {"cat": "Engineering", "q": "Organization requires TLS or IPSec for all network communications. Protecting data in what state?", "a": "Data in transit", "w": ["Data at rest", "Data in use", "DLP (Data Loss Prevention)"], "e": "In transit = moving over network (TLS, IPSec). At rest = stored (BitLocker). In use = in RAM (SGX). DLP = preventing unauthorized data exfiltration."}, {"cat": "Engineering", "q": "Donating old Self-Encrypting Drives (SEDs). Most efficient AND secure sanitization?", "a": "Cryptographic erase", "w": ["Secure erase", "Zero-fill", "Overwrite"], "e": "Cryptographic erase = destroy encryption key, instant, designed for SEDs. Secure erase = slower overwrite. Zero-fill/overwrite = for non-encrypted drives."}, {"cat": "Engineering", "q": "University research needs medical data but patient identities aren't required. How to protect PHI?", "a": "Tokenization (replace PHI with random tokens)", "w": ["Use DevSecOps", "Formal verification methods", "Migrate to SaaS"], "e": "Tokenization = de-identification, originals in separate vault. If identities unneeded, tokenize before processing. DevSecOps is good practice but doesn't address this specific issue."}, {"cat": "Engineering", "q": "Hiding a secret message inside an ordinary-looking image file. What technique?", "a": "Steganography", "w": ["Encryption", "Hashing", "Obfuscation"], "e": "Steganography = hides data WITHIN other data (images, audio). Hides the EXISTENCE of the message. Encryption = hides the CONTENT but data is obviously encrypted."}, {"cat": "Engineering", "q": "Two parties need to establish a shared secret over an insecure channel. Which algorithm?", "a": "Diffie-Hellman key exchange", "w": ["AES (Advanced Encryption Standard)", "SHA-256", "RSA encryption"], "e": "Diffie-Hellman = shared secret over insecure channel without pre-sharing keys. AES = symmetric encryption (needs existing key). SHA-256 = hashing. RSA = asymmetric enc."}, {"cat": "Engineering", "q": "CTO stored symmetric encryption key on an unencrypted memory card in an unlocked desk drawer. What error?", "a": "Improper key handling", "w": ["Key rotation", "Rekeying", "Mismatched key"], "e": "Improper key handling = keys not encrypted or physically secured. Key rotation = periodic replacement. Rekeying = changing mid-session. Mismatched = wrong key pair."}, {"cat": "GRC", "q": "Quarterly PCI-DSS assessment to check if risk level has changed. Which risk lifecycle phase?", "a": "Review", "w": ["Assess", "Identify", "Control"], "e": "Review = periodic re-evaluation. Identify = find risks. Assess = first-time analysis. Control = implement mitigations. 'Quarterly' + 'changed' = Review."}, {"cat": "GRC", "q": "First vulnerability scan classifies results as low/medium/high criticality. Which phase?", "a": "Assess", "w": ["Review", "Identify", "Control"], "e": "Assess = first-time analysis and classification. Review = periodic re-check. 'First scan' + 'classifying severity' = Assess."}, {"cat": "GRC", "q": "COO purchases data breach insurance after risk analysis. Which risk response?", "a": "Transference", "w": ["Avoidance", "Mitigation", "Acceptance"], "e": "Transference = shift risk to third party (insurance). Avoidance = stop activity. Mitigation = add controls. Acceptance = do nothing."}, {"cat": "GRC", "q": "Hospital pen test — which TWO are HIPAA compliance priorities?", "a": "PHI over HTTP + data at rest misconfigured on DB", "w": ["Cleartext LDAP + PHI over HTTP", "Cookie manipulation + tailgating", "Digital code signing + LDAP"], "e": "Hospital = HIPAA = PHI focus. Both correct answers directly protect PHI (transmission + storage). Match scan to the SPECIFIC regulation."}, {"cat": "GRC", "q": "German company uses customer emails (collected for account IDs) for marketing without separate consent. GDPR violation?", "a": "Yes — purpose limitation requires separate consent", "w": ["No — corporate employees had proper access", "No — data minimization wasn't violated", "No — CRM tool sent it securely"], "e": "GDPR: data for one purpose ≠ consent for another. Emails collected for account IDs require SEPARATE consent for marketing."}, {"cat": "GRC", "q": "Setting up credit card processing for retail + online. Most important compliance?", "a": "PCI-DSS (Payment Card Industry Data Security Standard)", "w": ["HIPAA", "GDPR", "PHI"], "e": "Credit cards = PCI-DSS. Healthcare = HIPAA. EU personal data = GDPR. PHI = health info (not a framework)."}, {"cat": "GRC", "q": "Best framework for consistent security across multi-cloud environments?", "a": "CSA (Cloud Security Alliance)", "w": ["ISO 27001", "COBIT", "NIST CSF"], "e": "CSA = cloud-specific. ISO 27001 = general infosec. COBIT = IT governance. NIST CSF = broad cybersecurity. Cloud = CSA."}, {"cat": "GRC", "q": "EU regulation ensuring fair competition in digital marketplace, targeting 'gatekeeper' platforms?", "a": "DMA (Digital Markets Act)", "w": ["GDPR", "SOX (Sarbanes-Oxley Act)", "NIST CSF"], "e": "DMA = digital platform competition. GDPR = personal data. SOX = financial reporting. NIST CSF = cybersecurity framework."}, {"cat": "GRC", "q": "What's the difference between due diligence and due care?", "a": "Diligence = researching risks; Care = acting on them", "w": ["Diligence = acting; Care = researching", "They mean the same thing", "Diligence = legal; Care = technical"], "e": "Due diligence = INVESTIGATE risks. Due care = IMPLEMENT protections. Both required to avoid negligence. 'We studied it' + 'We did something about it.'"}, {"cat": "GRC", "q": "Software with serious vulns released after 9 months. Security retrofit costs $100K. Which framework prevents this?", "a": "DevSecOps", "w": ["DevOps", "Agile model", "Waterfall model"], "e": "DevSecOps = security built IN during development. DevOps = no security. Agile/Waterfall = development methods, not inherently secure."}, {"cat": "GRC", "q": "SDLC Waterfall — correct 7-phase order?", "a": "Planning, Requirements, Design, Implementation, Testing, Deployment, Maintenance", "w": ["Requirements, Planning, Design, Implementation, Testing, Deployment, Maintenance", "Planning, Requirements, Design, Implementation, Deployment, Testing, Maintenance", "Requirements, Planning, Design, Implementation, Deployment, Testing, Maintenance"], "e": "PLANNING always first. P-R-D-I-T-D-M. Testing before deployment. 'Please Remember Doing It Takes Daily Motivation.'"}, {"cat": "GRC", "q": "Company wants code releases at least twice daily. Which technique?", "a": "CI/CD (Continuous Integration / Continuous Delivery)", "w": ["Waterfall", "Spiral", "Middleware"], "e": "CI/CD = automated testing + rapid deployment. Waterfall/Spiral = too slow for daily releases. Middleware = system integration, not a development technique."}, {"cat": "GRC", "q": "Testing that components work correctly TOGETHER. Which type?", "a": "Integration testing", "w": ["Unit testing", "Canary testing", "Regression testing"], "e": "Integration = TOGETHER. Unit = isolated. Regression = didn't break existing. Canary = small subset deployment."}, {"cat": "GRC", "q": "2,592 vulnerability findings on PHI systems. CISO wants a plan. What should you do FIRST?", "a": "Filter for critical items on PHI assets, remediate those first", "w": ["Fix all false positives then resolve remaining", "Wait until all are fixed before scanning again", "Sandbox all PHI assets then remediate"], "e": "Prioritize by risk to regulated data. Don't fix all 2,592 at once. Don't stop scanning. Don't sandbox (removes from production)."}, {"cat": "GRC", "q": "Server upgrades cause app issues. How to prevent in the future?", "a": "Configure a test lab for updates", "w": ["Automated patching server", "Virtualize and take daily snapshots", "Honeypot for testing"], "e": "TEST LAB = validate patches before production. Automated patching helps deployment but patches must be TESTED first."}, {"cat": "GRC", "q": "What identifies the most CRITICAL business functions and impact of disruption?", "a": "BIA (Business Impact Analysis)", "w": ["Risk register", "Vulnerability scan", "Penetration test"], "e": "BIA = which functions are critical + disruption impact. Establishes RTOs/RPOs. Done BEFORE BCP/DRP. Risk register = list of risks. Vuln scan/pen test = technical assessments."}, {"cat": "GRC", "q": "Executive responsible for data, sets classification policies. Which data role?", "a": "Data owner", "w": ["Data custodian", "Data steward", "Data processor"], "e": "Owner = executive, sets policies. Custodian = implements security (IT). Steward = quality/compliance. Controller = determines purpose (GDPR). Processor = processes on behalf of controller."}, {"cat": "GRC", "q": "What evaluates privacy risks before deploying a system that handles personal data?", "a": "PIA (Privacy Impact Assessment)", "w": ["BIA (Business Impact Analysis)", "Risk register", "Vulnerability assessment"], "e": "PIA = privacy risk evaluation before deployment. Required by GDPR/HIPAA. BIA = business criticality. Risk register = risk tracking. Vuln assessment = technical scanning."}, {"cat": "GRC", "q": "Vulnerability report should include physical hosts AND what else for accuracy?", "a": "Virtual hosts", "w": ["Processor utilization", "Log disposition", "Organizational governance"], "e": "Common mistake: scanning only physical hosts, missing VMs/containers/cloud. Include ALL assets — physical AND virtual."}, {"cat": "GRC", "q": "Identifies and mitigates risks from suppliers and vendors. What is this practice?", "a": "SCRM (Supply Chain Risk Management)", "w": ["Vendor lock-in analysis", "Outsourcing assessment", "Third-party auditing"], "e": "SCRM = risks from supply chain (SolarWinds attack showed why). Vendor assessments, contract requirements, continuous monitoring."}, {"cat": "GRC", "q": "Reviews and approves/rejects proposed changes to systems before implementation?", "a": "Change Control Board (CCB)", "w": ["Security Operations Center (SOC)", "Risk Management Committee", "Incident Response Team"], "e": "CCB = approves changes before deployment. Part of change management. Ensures changes are documented, tested, authorized. Prevents unauthorized modifications."}, {"cat": "GRC", "q": "An organization uses AI for risk assessments and compliance monitoring. Key risk of overreliance?", "a": "Overlooking system biases or inaccuracies", "w": ["Excessive computational resources", "Failing to scale", "Requiring extensive training"], "e": "Overreliance on AI = ignoring biases/inaccuracies in outputs = flawed decisions. Scalability, resources, and training are operational concerns, not overreliance risks."}];
 
const CATS=[...new Set(CARDS.map(c=>c.cat))];
const CC={"Architecture":{bg:"#dbeafe",bd:"#3b82f6",tx:"#1e3a5f",badge:"#3b82f6"},"SecOps":{bg:"#fee2e2",bd:"#ef4444",tx:"#7f1d1d",badge:"#ef4444"},"Engineering":{bg:"#d1fae5",bd:"#10b981",tx:"#064e3b",badge:"#10b981"},"GRC":{bg:"#fef3c7",bd:"#f59e0b",tx:"#92400e",badge:"#f59e0b"}};
const CF={"Architecture":"Domain 1: Architecture (33%)","SecOps":"Domain 2: SecOps (30%)","Engineering":"Domain 3: Engineering & Crypto (20%)","GRC":"Domain 4: GRC (17%)"};
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
 
let S={mode:"menu",sel:new Set(CATS),pick:false,deck:[],idx:0,flip:false,knew:new Set(),miss:new Set(),gMiss:new Set(),qmode:"quiz",answered:false,chosen:null,shuffledChoices:[]};
 
function fc(){return CARDS.filter(c=>S.sel.has(c.cat)).length}
function start(mo){
  let cards;
  if(mo){cards=[...S.gMiss].map(i=>CARDS[i]).filter(c=>S.sel.has(c.cat))}
  else{cards=CARDS.filter(c=>S.sel.has(c.cat))}
  if(!cards.length)return;
  S.deck=shuffle(cards);S.idx=0;S.flip=false;S.knew=new Set();S.miss=new Set();S.mode="study";S.answered=false;S.chosen=null;
  prepChoices();render();
}
function prepChoices(){
  if(S.idx>=S.deck.length)return;
  const c=S.deck[S.idx];
  S.shuffledChoices=shuffle([c.a,...c.w]);
  S.answered=false;S.chosen=null;
}
function know(){const g=CARDS.indexOf(S.deck[S.idx]);S.knew.add(g);S.gMiss.delete(g);adv()}
function miss2(){const g=CARDS.indexOf(S.deck[S.idx]);S.miss.add(g);S.gMiss.add(g);adv()}
function adv(){if(S.idx+1>=S.deck.length){S.mode="results"}else{S.idx++;S.flip=false;prepChoices()}render()}
function pickChoice(val){
  if(S.answered)return;
  S.answered=true;S.chosen=val;
  const c=S.deck[S.idx];const gi=CARDS.indexOf(c);
  if(val===c.a){S.knew.add(gi);S.gMiss.delete(gi)}
  else{S.miss.add(gi);S.gMiss.add(gi)}
  render();
}
function togCat(c){if(S.sel.has(c)){if(S.sel.size>1)S.sel.delete(c)}else S.sel.add(c);render()}
function selAll(){S.sel=new Set(CATS);render()}
function setMode(m){S.qmode=m;render()}
 
function render(){const a=document.getElementById("app");if(S.mode==="menu")rMenu(a);else if(S.mode==="study")rStudy(a);else rRes(a)}
 
function rMenu(el){
const g=S.gMiss.size;
el.innerHTML=`<div class="menu">
<div class="logo"><div class="logo-sub">CompTIA</div><div class="logo-main">SecurityX</div><div class="logo-desc">CAS-005 Flashcard Drill</div><div class="logo-bar"></div></div>
<div class="stat-row"><div class="stat-box"><div class="stat-num">${CARDS.length}</div><div class="stat-label">TOTAL CARDS</div></div><div class="stat-box"><div class="stat-num">4</div><div class="stat-label">DOMAINS</div></div><div class="stat-box"><div class="stat-num">${g}</div><div class="stat-label">TO REVIEW</div></div></div>
<div class="mode-toggle">
<div class="mode-btn ${S.qmode==='quiz'?'active':'inactive'}" onclick="setMode('quiz')">📝 Quiz Mode</div>
<div class="mode-btn ${S.qmode==='flash'?'active':'inactive'}" onclick="setMode('flash')">🔄 Flashcard Mode</div>
</div>
<div class="cat-box"><div class="cat-header"><span class="cat-label">Domains (${S.sel.size}/${CATS.length})</span><div class="cat-btns"><button onclick="selAll()">All</button><button onclick="S.pick=!S.pick;render()">${S.pick?"Hide":"Pick"}</button></div></div>${S.pick?`<div class="cat-grid">${CATS.map(c=>{const n=CARDS.filter(x=>x.cat===c).length;return`<div class="cat-tag ${S.sel.has(c)?'active':''}" style="${S.sel.has(c)?`background:${CC[c].badge};border-color:${CC[c].badge}`:''}" onclick="togCat('${c}')">${CF[c]} (${n})</div>`}).join("")}</div>`:""}<div class="cat-count">${fc()} cards selected</div></div>
<button class="btn-start" onclick="start(false)">Start ${S.qmode==='quiz'?'Quiz':'Drill'} (${fc()} cards)</button>
${g>0?`<button class="btn-missed" onclick="start(true)">Review Missed Only (${g})</button>`:""}
${S.qmode==='flash'?`<div class="shortcuts"><b>Keyboard:</b> Space=flip · →/K=knew · ←/M=missed</div>`:`<div class="shortcuts"><b>Keyboard:</b> 1-4=pick answer · Enter/→=next</div>`}
</div>`}
 
function rStudy(el){
const c=S.deck[S.idx];const cl=CC[c.cat]||CC.Architecture;const p=(S.idx/S.deck.length)*100;
let body='';
if(S.qmode==='flash'){
  // Flashcard mode
  body=`<div class="card ${S.flip?'answer':'question'}" style="${S.flip?`background:linear-gradient(145deg,${cl.bg},#fff);border-color:${cl.bd}`:''}" onclick="S.flip=!S.flip;render()">
${!S.flip?`<div class="q-text">${c.q}</div><div class="tap-hint">tap to reveal</div>`
:`<div class="a-label">Answer</div><div class="a-text" style="color:${cl.tx}">${c.a}</div><div style="margin-top:8px;font-size:11px;color:#64748b;line-height:1.4">${c.e}</div>`}
</div>${S.flip?`<div class="action-btns"><button class="btn-miss" onclick="miss2()">✗ Missed</button><button class="btn-know" onclick="know()">✓ Knew it</button></div>`:''}`;
} else {
  // Quiz mode
  const choices=S.shuffledChoices.map(ch=>{
    let cls='choice';
    if(S.answered){
      if(ch===c.a)cls+=' correct';
      else if(ch===S.chosen)cls+=' wrong';
      else cls+=' disabled';
    }
    return `<button class="${cls}" onclick="pickChoice(\`${ch.replace(/`/g,"\\`").replace(/'/g,"\\'")}\`)">${ch}</button>`;
  }).join('');
  body=`<div class="card question"><div class="q-text">${c.q}</div></div>
<div class="choices">${choices}</div>
${S.answered?`<div class="explanation"><b>${S.chosen===c.a?'✓ Correct!':'✗ Incorrect.'}</b> ${c.e}</div><button class="btn-next" onclick="adv()">Next →</button>`:''}`;
}
el.innerHTML=`<div class="study">
<div class="study-header"><button class="exit" onclick="S.mode='menu';render()">✕ Exit</button><span class="counter">${S.idx+1}/${S.deck.length}</span><div class="scores"><span class="g">✓${S.knew.size}</span><span class="r">✗${S.miss.size}</span></div></div>
<div class="progress-bar"><div class="progress-fill" style="width:${p}%"></div></div>
<div class="badge" style="background:${cl.badge}">${CF[c.cat]||c.cat}</div>
${body}</div>`}
 
function rRes(el){const t=S.deck.length;const k=S.knew.size;const m=S.miss.size;const p=t?Math.round(k/t*100):0;const e=p>=85?"🔥":p>=70?"💪":"📚";const mc=S.deck.filter((_,i)=>S.miss.has(CARDS.indexOf(S.deck[i])));
el.innerHTML=`<div class="results"><div class="emoji">${e}</div><div class="pct">${p}%</div><div class="summary">${k} correct · ${m} missed · ${t} total</div><div class="result-bar"><div class="fill" style="width:0%"></div></div>
${m>0?`<div class="missed-box"><div class="mlabel">Missed (${m}):</div>${mc.map(c=>`<div class="mitem" style="border-color:${CC[c.cat]?.badge||'#666'}">${c.q.substring(0,85)}${c.q.length>85?"...":""}</div>`).join("")}</div>`:""}
<div class="result-btns"><button class="btn-back" onclick="S.mode='menu';render()">Menu</button>${m>0?`<button class="btn-retry" onclick="start(true)">Drill Missed (${m})</button>`:""}</div></div>`;
setTimeout(()=>{const f=document.querySelector('.result-bar .fill');if(f)f.style.width=p+'%'},50)}
 
document.addEventListener("keydown",e=>{
if(S.mode!=="study")return;
if(S.qmode==='flash'){
  if(e.key===" "||e.key==="Enter"){e.preventDefault();S.flip=!S.flip;render()}
  if((e.key==="ArrowRight"||e.key==="k")&&S.flip)know();
  if((e.key==="ArrowLeft"||e.key==="m")&&S.flip)miss2();
} else {
  if(!S.answered){
    const n=parseInt(e.key);
    if(n>=1&&n<=S.shuffledChoices.length)pickChoice(S.shuffledChoices[n-1]);
  } else {
    if(e.key==="Enter"||e.key==="ArrowRight"||e.key===" ")adv();
  }
}});
render();
</script></body></html>

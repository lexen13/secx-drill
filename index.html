<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>SecurityX Drill</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SecX Drill">

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:#0f172a;color:#f8fafc;overscroll-behavior:none}
.app{height:100vh;height:100dvh;display:flex;flex-direction:column;padding:env(safe-area-inset-top) 16px env(safe-area-inset-bottom) 16px;max-width:520px;margin:0 auto;overflow-y:auto;-webkit-overflow-scrolling:touch}
.menu{flex:1;display:flex;flex-direction:column;padding-top:16px}
.logo{text-align:center;margin-bottom:20px}
.logo-sub{font-size:11px;letter-spacing:4px;color:#94a3b8;text-transform:uppercase;margin-bottom:3px}
.logo-main{font-size:30px;font-weight:800;letter-spacing:-1px}
.logo-desc{font-size:13px;color:#cbd5e1;margin-top:2px}
.logo-bar{width:50px;height:3px;background:#ef4444;margin:8px auto 0;border-radius:2px}
.stat-row{display:flex;gap:8px;margin-bottom:12px}
.stat-box{flex:1;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:10px;text-align:center}
.stat-num{font-size:20px;font-weight:800;color:#f8fafc}
.stat-label{font-size:10px;color:#64748b;margin-top:2px}
.cat-box{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:12px;margin-bottom:10px}
.cat-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.cat-label{color:#e2e8f0;font-size:12px;font-weight:600}
.cat-btns{display:flex;gap:5px}
.cat-btns button{background:none;border:1px solid rgba(255,255,255,0.2);color:#94a3b8;border-radius:6px;padding:3px 9px;font-size:10px;cursor:pointer}
.cat-grid{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:4px}
.cat-tag{border-radius:14px;padding:4px 9px;font-size:10px;cursor:pointer;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:#64748b;transition:all .15s;font-weight:400;line-height:1.4}
.cat-tag.active{color:#fff;font-weight:600}
.cat-count{color:#64748b;font-size:11px;margin-top:3px}
.btn-start{width:100%;padding:14px;background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(239,68,68,0.3);margin-bottom:7px;-webkit-appearance:none}
.btn-start:active{transform:scale(.98)}
.btn-missed{width:100%;padding:12px;background:rgba(239,68,68,0.12);color:#fca5a5;border:1px solid rgba(239,68,68,0.3);border-radius:12px;font-size:12px;font-weight:600;cursor:pointer;margin-bottom:7px;-webkit-appearance:none}
.btn-missed:active{transform:scale(.98)}
.shortcuts{text-align:center;margin-top:8px;color:#475569;font-size:10px;line-height:1.5}
.shortcuts b{color:#94a3b8}
.study{flex:1;display:flex;flex-direction:column;padding-top:6px}
.study-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;font-size:11px}
.study-header .exit{background:none;border:none;color:#64748b;cursor:pointer;font-size:11px;padding:4px}
.study-header .counter{color:#94a3b8;font-weight:600}
.study-header .scores{display:flex;gap:8px}
.study-header .g{color:#4ade80}.study-header .r{color:#f87171}
.progress-bar{height:3px;background:rgba(255,255,255,0.1);border-radius:2px;margin-bottom:10px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#ef4444,#f97316);border-radius:2px;transition:width .3s ease}
.badge{display:inline-block;padding:3px 10px;border-radius:14px;font-size:10px;font-weight:600;color:#fff;margin-bottom:8px}
.card{border-radius:14px;padding:24px 18px;min-height:180px;cursor:pointer;display:flex;flex-direction:column;justify-content:center;transition:all .2s ease;flex:1;max-height:58vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.card.question{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12)}
.card.answer{border:1px solid;box-shadow:0 8px 32px rgba(0,0,0,0.2)}
.card .q-text{font-size:15px;font-weight:600;line-height:1.5;color:#f1f5f9}
.card .tap-hint{font-size:10px;color:#475569;text-align:center;margin-top:12px}
.card .a-label{font-size:10px;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
.card .a-text{font-size:13px;line-height:1.6;font-weight:500}
.action-btns{display:flex;gap:10px;margin-top:10px;padding-bottom:6px;flex-shrink:0}
.action-btns button{flex:1;padding:13px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;-webkit-appearance:none}
.action-btns button:active{transform:scale(.97)}
.btn-miss{background:rgba(239,68,68,0.12);color:#fca5a5;border:1px solid rgba(239,68,68,0.25)}
.btn-know{background:rgba(34,197,94,0.12);color:#86efac;border:1px solid rgba(34,197,94,0.25)}
.results{flex:1;display:flex;flex-direction:column;align-items:center;padding-top:20px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.results .emoji{font-size:50px;margin-bottom:4px}
.results .pct{font-size:26px;font-weight:800}
.results .summary{color:#94a3b8;font-size:12px;margin-bottom:16px}
.result-bar{width:100%;height:7px;border-radius:4px;background:rgba(255,255,255,0.1);margin-bottom:20px;overflow:hidden}
.result-bar .fill{height:100%;background:#22c55e;border-radius:4px;transition:width .6s ease}
.missed-box{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:12px;margin-bottom:14px;text-align:left;max-height:40vh;overflow-y:auto}
.missed-box .label{color:#fca5a5;font-size:11px;font-weight:600;margin-bottom:6px}
.missed-box .item{color:#cbd5e1;font-size:10px;margin-bottom:4px;padding-left:7px;border-left:2px solid;line-height:1.4}
.missed-box .cat{color:#64748b;font-size:9px}
.result-btns{display:flex;gap:8px;width:100%;margin-top:6px;padding-bottom:12px}
.result-btns button{flex:1;padding:12px;border-radius:12px;font-size:12px;font-weight:600;cursor:pointer;-webkit-appearance:none}
.result-btns button:active{transform:scale(.97)}
.btn-back{background:rgba(255,255,255,0.08);color:#e2e8f0;border:1px solid rgba(255,255,255,0.15)}
.btn-retry{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;border:none}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
const CARDS=[{"cat": "Architecture", "q": "A fire destroyed your company's main office — unusable for 3 months. Which plan dictates recovery: BCP (Business Continuity Plan) or DRP (Disaster Recovery Plan)?", "a": "DRP (Disaster Recovery Plan). DRP = resume work AFTER a specific disaster. BCP = broader plan for operating DURING any disruption (people, partners, processes). 'Respond to disaster' = DRP. 'Keep business running' = BCP."}, {"cat": "Architecture", "q": "Your company needs email restored within 4 hours and can tolerate losing 30 minutes of data. Which metric is 4 hours? Which is 30 minutes?", "a": "4 hours = RTO (Recovery Time Objective) — max acceptable downtime. 30 minutes = RPO (Recovery Point Objective) — max acceptable data loss. RTO = time. RPO = data."}, {"cat": "Architecture", "q": "A router ran 183 days before failing. Techs fixed it in 4 hours. Name both metrics.", "a": "183 days = MTBF (Mean Time Between Failures). 4 hours = MTTR (Mean Time To Repair). Higher MTBF = more reliable. Lower MTTR = faster repairs."}, {"cat": "Architecture", "q": "$3.125M data center, 60% damage from hurricanes every 20 years. Calculate ALE (Annual Loss Expectancy).", "a": "SLE = $3,125,000 × 0.60 = $1,875,000. ARO = 1/20 = 0.05. ALE = $1,875,000 × 0.05 = $93,750/year. Formula: ALE = SLE × ARO."}, {"cat": "Architecture", "q": "4 DLP vendors replacing FTEs at $75K/yr over 5 years: Alpha($1M, 3 FTE), Bravo($1.3M, 4), Charlie($1.7M, 5), Delta($2M, 6). Which has LOWEST ROI?", "a": "Alpha: (3×$75K×5)-$1M = $125K. Bravo: $200K. Charlie: $175K. Delta: $250K. Alpha = LOWEST ROI ($125K). Always calculate ALL options. Watch 'lowest' vs 'highest.'"}, {"cat": "Architecture", "q": "Cloud app needs more servers during peak. A sysadmin manually approves each addition. Horizontal scaling, vertical scaling, or autoscaling?", "a": "Horizontal scaling — adding MORE servers. Not autoscaling (human approval needed). Vertical = adding CPU/RAM to existing server. Autoscaling = automatic, policy-driven."}, {"cat": "Architecture", "q": "For max load balancer availability globally: single LB, active-passive, or active-active in multiple regions?", "a": "Active-active in multiple regions. Routes to nearest operational server, zero downtime. Active-passive = downtime during switch. Single = single point of failure."}, {"cat": "Architecture", "q": "What distributes and replicates web content across geographic locations for faster user access: CDN, load balancer, or traffic shaping?", "a": "CDN (Content Delivery Network). Puts content CLOSER to users geographically. Load balancer = distributes requests across servers. Traffic shaping = prioritizes bandwidth per protocol."}, {"cat": "Architecture", "q": "What controls how much bandwidth each protocol gets on the network?", "a": "Traffic Shaping (packet shaping). Prioritizes and allocates bandwidth per protocol/user type. Not load balancing (distributes requests), not HA (eliminates single points of failure)."}, {"cat": "Architecture", "q": "Financial org deploys IPS (Intrusion Prevention System) but wants to avoid blocking legitimate traffic during initial weeks. Which deployment mode?", "a": "Inline + Alert-Only during initial deployment. Sits in traffic path (needed for future blocking) but only alerts until rules are tuned. Best practice: alert → tune → enforce. Passive can't ever block. Bypass = security gap."}, {"cat": "Architecture", "q": "Signature-based IDS (Intrusion Detection System) keeps missing zero-day attacks. What detection method should you add?", "a": "Anomaly-based detection. Builds baseline of normal traffic, flags deviations — catches unknown/zero-day threats. Signature = KNOWN patterns only. More false positives but catches what signatures miss."}, {"cat": "Architecture", "q": "E-commerce platform worried about IPS performance with high traffic. Signature-based or anomaly-based?", "a": "Anomaly-based with threshold adjustments. Signature requires extensive rule matching = performance hit. Anomaly with tuned thresholds is more efficient for high-volume dynamic environments."}, {"cat": "Architecture", "q": "What's the difference between a network tap (passive monitoring) and an inline IPS?", "a": "Tap = PASSIVE — copies traffic for analysis, cannot block. IPS inline = ACTIVE — sits in traffic path, CAN block. Tap = visibility only. Inline = prevention."}, {"cat": "Architecture", "q": "IDS detects but an IPS prevents. What letter changes and what does it mean?", "a": "D = Detection (alerts only, passive). P = Prevention (blocks threats, inline). Both can be H (Host-based — on one machine) or N (Network-based — monitoring traffic). HIDS, HIPS, NIDS, NIPS."}, {"cat": "Architecture", "q": "Firewall allows HTTP on port 80, but attackers tunnel non-HTTP traffic through it. Stateful firewall won't catch this. What will?", "a": "Application-Aware Firewall / NGFW (Layer 7). Inspects packet CONTENTS to verify actual protocol. Stateless/stateful (L3-4) only see headers/ports — can't inspect payload."}, {"cat": "Architecture", "q": "What should the very last rule in your firewall ACL (Access Control List) always be?", "a": "Implicit DENY (deny all). Everything not explicitly allowed above gets blocked. Implicit allow at the end = terrible security. Universal best practice."}, {"cat": "Architecture", "q": "HR (172.16.1.3) needs SMB access to file server (192.168.1.12). Most restrictive ACL entry? (Source, Dest, Port, Protocol, Action)", "a": "172.16.1.3, 192.168.1.12, 445, TCP, ALLOW. Only HR IP, only file server IP, only SMB port 445, only TCP. Most restrictive = minimum IPs + minimum ports."}, {"cat": "Architecture", "q": "What type of firewall specifically protects web applications from attacks like SQL injection (SQLi) and XSS (Cross-Site Scripting)?", "a": "WAF (Web Application Firewall). Operates at Layer 7, specifically designed for web app protection. An NGFW is broader — inspects all application traffic, not just web. WAF = web-specific."}, {"cat": "Architecture", "q": "What's the difference between a forward proxy and a reverse proxy?", "a": "Forward proxy = sits between USERS and the internet (users → proxy → internet). Hides client identity, content filtering. Reverse proxy = sits between INTERNET and your servers (internet → proxy → servers). Load balancing, SSL termination, hides server identity."}, {"cat": "Architecture", "q": "After lateral movement across a flat network, which strategy prevents it: VLANs, micro-segmentation, or grouping systems in one zone?", "a": "Micro-segmentation. Tiny isolated segments with strict per-workload controls. Single VLAN = still flat. One secure zone = protects only that zone. Micro-seg stops lateral movement everywhere."}, {"cat": "Architecture", "q": "Your VPN gives excessive trust after connection. To implement Zero Trust, what should you deploy?", "a": "Always-on VPN with user AND device identity verification for EVERY session. Zero Trust = 'never trust, always verify.' Continuous verification of both user and device identity, every session."}, {"cat": "Architecture", "q": "Company wants SDN (Software-Defined Networking) but won't abandon existing physical devices. Hybrid, Overlay, or Open SDN?", "a": "Hybrid SDN — traditional + SDN in same environment. Keeps existing hardware directly managed while adding SDN. Overlay = virtualizes on top, removes direct management. Open = open-source, reduces vendor lock-in."}, {"cat": "Architecture", "q": "Multinational needs secure, dynamic traffic management integrating with cloud security tools. Dynamic routing protocol or SD-WAN?", "a": "SD-WAN (Software-Defined WAN). Dynamic traffic routing AND cloud security integration. Routing protocols (OSPF, BGP) handle routing but lack security integration. 'Cloud security integration' = SD-WAN."}, {"cat": "Architecture", "q": "Servers/switches provisioned instantly over the internet. IaaS, PaaS, SaaS, or DaaS?", "a": "IaaS (Infrastructure as a Service). Raw infrastructure on demand. PaaS = managed platform (Heroku). SaaS = full app (Gmail, O365). DaaS = virtual desktops (WorkSpaces)."}, {"cat": "Architecture", "q": "CIO proposes migrating all server images to cloud after data breaches. What's the flaw?", "a": "Only changes LOCATION, not attack surface. Poor security on-prem = poor security in cloud. Must fix root causes before migrating. Moving ≠ securing."}, {"cat": "Architecture", "q": "What connects branch offices to a cloud VPC (Virtual Private Cloud) via IPSec site-to-site tunnels?", "a": "VPN Gateway. Bridges remote sites to cloud VPC. Not API gateway (API functions), not NAT gateway (private subnet internet access), not XML gateway (XML filtering)."}, {"cat": "Architecture", "q": "In cloud computing, who is responsible for patching the guest OS in an IaaS model — you or the provider?", "a": "YOU (the customer). In IaaS, the provider manages hardware/networking/virtualization. You manage the OS, apps, and data — including patching. This is the Shared Responsibility Model. In SaaS, the provider handles everything."}, {"cat": "Architecture", "q": "What cloud security tool acts as a gatekeeper between users and SaaS applications, enforcing DLP, access control, and shadow IT discovery?", "a": "CASB (Cloud Access Security Broker). Sits between users and cloud services. Enforces security policies for cloud app usage. Think: firewall specifically for cloud apps."}, {"cat": "Architecture", "q": "Type 1 vs Type 2 hypervisor — which is more secure and why?", "a": "Type 1 (bare metal — ESXi, Hyper-V) = MORE SECURE, runs directly on hardware, no host OS to attack. Type 2 (VirtualBox, VMware Workstation) = runs on host OS, inherits host vulnerabilities."}, {"cat": "Architecture", "q": "Attacker breaks out of a VM to access the hypervisor and other VMs. What's this attack?", "a": "VM Escape. Breaks VM isolation to reach the host/other VMs. Why hypervisor patching and isolation controls are critical."}, {"cat": "Architecture", "q": "Containers vs VMs — which provides stronger isolation?", "a": "VMs provide STRONGER isolation (full guest OS, separate kernel). Containers share the host OS kernel — lighter and faster but less isolation. Docker/Kubernetes = containers. Hyper-V/VMware = VMs."}, {"cat": "Architecture", "q": "Domain receives spoofed emails. Which 3 DNS-based email auth protocols to implement?", "a": "SPF (Sender Policy Framework) — which servers can send. DKIM (DomainKeys Identified Mail) — digital signature on emails. DMARC (Domain-based Message Auth) — policy when SPF/DKIM fail. Use all three."}, {"cat": "Architecture", "q": "What does DNSSEC protect against, and what does it NOT do?", "a": "Protects against DNS spoofing/cache poisoning via digital signatures on DNS records. Does NOT encrypt queries — that's DoH (DNS over HTTPS) or DoT (DNS over TLS). DNSSEC = authenticity. DoH/DoT = privacy."}, {"cat": "Architecture", "q": "Main security improvement of WPA3 over WPA2?", "a": "SAE (Simultaneous Authentication of Equals) prevents offline dictionary attacks. Adds forward secrecy and OWE (Opportunistic Wireless Encryption) for open networks. Replaces WPA2's vulnerable 4-way handshake."}, {"cat": "Architecture", "q": "Hot site vs warm site vs cold site?", "a": "Hot = fully operational mirror, minutes, MOST expensive. Warm = hardware installed, needs data restored, hours. Cold = empty facility with power, days/weeks, CHEAPEST. Middle ground = warm."}, {"cat": "Architecture", "q": "A facility needs to verify each person's identity AND prevent tailgating into the server room. What two controls?", "a": "Biometric reader (verifies identity — fingerprint/retina/face) + Access Control Vestibule (mantrap — prevents tailgating, one person at a time). Proximity cards verify card POSSESSION, not identity. CCTV monitors but doesn't prevent."}, {"cat": "SecOps", "q": "Name the 7 stages of the Lockheed Martin Cyber Kill Chain in order.", "a": "1) Reconnaissance 2) Weaponization 3) Delivery 4) Exploitation 5) Installation 6) Command & Control (C2) 7) Actions on Objectives. Breaking ANY stage disrupts the attack."}, {"cat": "SecOps", "q": "Which framework maps adversary tactics and techniques into a matrix organized by phases like Initial Access, Persistence, Lateral Movement?", "a": "MITRE ATT&CK. Tactics = the WHY (goals like persistence). Techniques = the HOW (specific methods). Used for threat hunting, detection engineering, gap analysis. Real-world adversary behaviors."}, {"cat": "SecOps", "q": "The Diamond Model of Intrusion Analysis has 4 core features. Name them.", "a": "Adversary, Capability, Infrastructure, Victim. Every intrusion = adversary using a capability via infrastructure against a victim. Used to correlate threat intelligence across incidents."}, {"cat": "SecOps", "q": "Name the 6 phases of the NIST Incident Response lifecycle in order.", "a": "1) Preparation 2) Detection & Analysis 3) Containment 4) Eradication 5) Recovery 6) Post-Incident Activity (Lessons Learned). 'Prepare, Detect, Contain, Eradicate, Recover, Learn.'"}, {"cat": "SecOps", "q": "You need to stop an attacker from spreading while preserving evidence. Which IR phase?", "a": "Containment. Limit damage, prevent lateral movement, preserve evidence. Before eradication (removing threat) and recovery (restoring systems)."}, {"cat": "SecOps", "q": "Tabletop exercise vs functional exercise vs full-scale exercise?", "a": "Tabletop = discussion walkthrough, no real systems, cheapest. Functional = simulated with actual procedures tested. Full-scale = realistic live exercise, real systems, most expensive. Complexity and cost increase left to right."}, {"cat": "SecOps", "q": "After an incident is fully resolved and systems restored, what's the final IR phase and why does it matter?", "a": "Post-Incident Activity (Lessons Learned). Document what happened, what worked, what failed, and how to improve. Without this phase, you repeat the same mistakes. Also required for compliance reporting."}, {"cat": "SecOps", "q": "In digital forensics, what's the 'order of volatility' and what do you collect first?", "a": "Most volatile (disappears fastest) to least: 1) CPU registers/cache 2) RAM 3) Swap/temp 4) Disk 5) Remote logs 6) Backups. Capture RAM BEFORE pulling the plug — it's gone at power-off."}, {"cat": "SecOps", "q": "Forensic examiner creates a bit-for-bit drive copy and hashes both. What two concepts?", "a": "1) Forensic imaging — exact bit-level duplicate including deleted files/slack space. 2) Integrity verification — matching hashes PROVE copy is identical and untampered. Maintains chain of custody."}, {"cat": "SecOps", "q": "Why use a write blocker when forensically imaging a drive?", "a": "Prevents ANY modification to original evidence. Without it, connecting the drive can alter timestamps or write data, contaminating evidence and breaking chain of custody."}, {"cat": "SecOps", "q": "Website defaced with 'Killers of the Arctic' targeting an oil company. Which threat actor?", "a": "Hacktivist. Social/political cause (environmentalism). APT = nation-state. Organized crime = money. Script kiddie = unskilled, uses others' tools. Political message = hacktivist."}, {"cat": "SecOps", "q": "Fired employee's account never deactivated, credentials used to breach network. What threat category?", "a": "Insider Threat. Current or FORMER employees with authorized access. The ONLY threat actor that can be 'inadvertent' or accidental. APTs, hacktivists, and organized crime are always deliberate."}, {"cat": "SecOps", "q": "Which threat actor type is typically nation-state backed, operates long-term, and uses sophisticated custom malware?", "a": "APT (Advanced Persistent Threat). 'Advanced' = sophisticated tools. 'Persistent' = long-term presence. Nation-state resources. Examples: APT28 (Russia), APT41 (China). Deliberate, targeted, well-funded."}, {"cat": "SecOps", "q": "What is OSINT (Open-Source Intelligence)? Give 3 examples.", "a": "Intelligence from PUBLICLY AVAILABLE sources. Examples: VirusTotal (malware scanning), Shodan (internet device search), social media, DNS/WHOIS records, public forums, job postings. Free and legal."}, {"cat": "SecOps", "q": "Suspicious files on a potentially compromised server. Local AV or VirusTotal?", "a": "VirusTotal (external, 60+ AV engines). NEVER trust local tools on a compromised system — the AV itself may be compromised. Always use external analysis."}, {"cat": "SecOps", "q": "What are STIX and TAXII in threat intelligence?", "a": "STIX (Structured Threat Information eXpression) = FORMAT for threat data (IoCs, TTPs). TAXII (Trusted Automated eXchange of Indicator Info) = TRANSPORT protocol for sharing STIX. STIX = what. TAXII = how it's delivered."}, {"cat": "SecOps", "q": "What does a CVSS score of 9.8 mean?", "a": "CRITICAL severity (0-10 scale). Remotely exploitable, no auth needed, full compromise. 0-3.9=Low, 4-6.9=Medium, 7-8.9=High, 9-10=Critical. Patch 9.8s IMMEDIATELY."}, {"cat": "SecOps", "q": "Forum chatter about an exploit targeting your software stack. Best OSINT response?", "a": "Cross-reference exploit details with your INTERNAL systems to identify if vulnerable, then take preventive action. Don't just share (no mitigation). Don't blindly block IPs (too broad). Use OSINT to ACT."}, {"cat": "SecOps", "q": "SIEM (Security Info & Event Mgmt) correlates outbound traffic spikes with failed logins. What makes SIEM valuable?", "a": "CENTRALIZED visibility and CORRELATION of logs from multiple systems. Collects from firewalls, servers, IDS, endpoints. Doesn't block (IPS) or automate response (SOAR) — provides visibility and pattern detection."}, {"cat": "SecOps", "q": "What tool automates incident response workflows using playbooks and integrates with your SIEM?", "a": "SOAR (Security Orchestration, Automation & Response). Takes ACTION on SIEM alerts automatically. Playbook-driven. SIEM = visibility/correlation. SOAR = automated response."}, {"cat": "SecOps", "q": "What uses ML to build baselines of normal user behavior and flags anomalous deviations?", "a": "UEBA (User & Entity Behavior Analytics). Machine learning baselines + anomaly detection focused on USER behavior patterns. Not HIDS (signature-based). Not EDR (endpoint-focused). UEBA = behavioral baselines for users."}, {"cat": "SecOps", "q": "EDR monitors endpoints. What extends detection across endpoints + network + cloud + email in one unified platform?", "a": "XDR (Extended Detection & Response). EDR expanded across MULTIPLE layers for correlated cross-platform visibility. EDR = endpoints only. XDR = everything unified."}, {"cat": "SecOps", "q": "Team converts ransomware binary to readable code to analyze encryption routine and C2. Which technique?", "a": "Disassembly (static reverse engineering). Binary → readable code WITHOUT running it. Dynamic = run and observe. Behavioral = monitor system changes. Sandboxing = isolated execution. 'Analyze the code' = disassembly."}, {"cat": "SecOps", "q": "Game exploit buys 1 life, modifies config to show 100 BEFORE app reads. What vulnerability?", "a": "Race Condition. Outcome depends on TIMING — races to modify before the app checks. Keywords: 'before', 'between', 'while.' NOT sensitive data exposure (data readable without controls)."}, {"cat": "SecOps", "q": "XML input: <!ENTITY abc SYSTEM 'file:///etc/passwd'> with &abc; in data. What attack?", "a": "XXE (XML External Entity). Malicious XML references local files. Fix: disable DTD (Document Type Definition) processing. Not SQLi (database), not XSS (browser scripts)."}, {"cat": "SecOps", "q": "Phishing links bypass security suite. Block IP in firewall or add domain to content filter?", "a": "Content filter/web proxy block list. Domain blocking > IP blocking — attackers change IPs but domains persist."}, {"cat": "SecOps", "q": "Newly discovered software flaw unknown to vendor, no patch. What's it called?", "a": "Zero-Day vulnerability. Unknown to vendor, unpatched. Once disclosed or patched, no longer zero-day."}, {"cat": "SecOps", "q": "Want to collect attacker payloads without risking production. Honeypot, sandbox, or jumpbox?", "a": "Honeypot — DECOY system to LURE attackers and study methods. Sandbox = isolated environment to ANALYZE suspicious code. Jumpbox = hardened entry point to internal systems. Honeypot attracts. Sandbox contains."}, {"cat": "SecOps", "q": "Which IoC (Indicator of Compromise) is HOST-based, not account-based: off-hours usage, malicious processes, failed logins, or unauthorized sessions?", "a": "Malicious processes = HOST-based (system-level). Account-based: off-hours usage, failed logins, unauthorized sessions, impossible travel. 'Process' = host. 'Login/session' = account."}, {"cat": "SecOps", "q": "To find Domain Controllers via DNS, which two protocols: LDAP, Kerberos, SMTP, or NTLM?", "a": "LDAP (directory services, port 389) + Kerberos (authentication, port 88). DCs = directory + auth. SMTP = email. NTLM = legacy."}, {"cat": "SecOps", "q": "What's the difference between phishing, spear phishing, whaling, vishing, and smishing?", "a": "Phishing = mass email. Spear phishing = targeted at specific person/org. Whaling = targets executives (the 'big fish'). Vishing = voice/phone phishing. Smishing = SMS/text phishing. All are social engineering."}, {"cat": "SecOps", "q": "Attacker sends highly tailored emails referencing specific employee roles and projects, created using AI tools. What type of attack?", "a": "Social engineering leveraging AI-based customization (AI-enhanced spear phishing). AI analyzes public info to create personalized, credible phishing. Not deepfake (fabricated media), not automated exploit crafting (technical vulns)."}, {"cat": "SecOps", "q": "Attacker tries thousands of username/password combinations from a breached database against your login page. What attack?", "a": "Credential Stuffing. Uses leaked credentials from OTHER breaches, betting users reuse passwords. Different from brute force (tries all combinations) and password spraying (one password across many accounts)."}, {"cat": "SecOps", "q": "Attacker tries ONE common password (like 'Winter2024!') against thousands of accounts before trying the next password. What attack?", "a": "Password Spraying. One password across many accounts to avoid lockouts. Brute force = all combos against one account. Credential stuffing = leaked username/password pairs."}, {"cat": "Engineering", "q": "Access controlled by classification labels (Secret, Top Secret). Users cannot override. Which model, strongest or weakest?", "a": "MAC (Mandatory Access Control) — STRONGEST. System-enforced labels. Ranking: MAC > RBAC (Role-Based) > DAC (Discretionary, weakest). 'Strongest' = MAC, always."}, {"cat": "Engineering", "q": "Users assigned to 'HR' and 'Finance' groups with permissions. Can't modify own access. Which model?", "a": "RBAC (Role-Based Access Control). Roles determine permissions, non-discretionary. DAC = owner controls (weakest). MAC = labels (strongest). ABAC = attribute conditions (most flexible)."}, {"cat": "Engineering", "q": "Access only when dept=HR AND time=business_hours AND location=office. Which model?", "a": "ABAC (Attribute-Based Access Control). Multiple attributes (user, resource, environment) for decisions. Most FLEXIBLE model. RBAC = roles only. MAC = labels only."}, {"cat": "Engineering", "q": "File owner decides who can read/write their files. Users can share with anyone they choose. Which model?", "a": "DAC (Discretionary Access Control). WEAKEST model — owner controls permissions. Windows file sharing is DAC. Users CAN modify their own permissions. No central enforcement."}, {"cat": "Engineering", "q": "Token generates a one-time password that does NOT expire — valid until used. HOTP or TOTP?", "a": "HOTP (HMAC-based One-Time Password). Counter-based, valid until used. TOTP (Time-based OTP) expires every 30-60 sec. H = Holds forever. T = Time Ticks away."}, {"cat": "Engineering", "q": "What is OAuth (Open Authorization) and what does it NOT do?", "a": "AUTHORIZATION framework — apps access resources WITHOUT sharing passwords. Uses tokens. NOT authentication ('who are you?'). OAuth = 'what can this app access?' OpenID Connect handles identity."}, {"cat": "Engineering", "q": "What XML-based protocol enables SSO (Single Sign-On) between an identity provider and service providers in enterprise environments?", "a": "SAML (Security Assertion Markup Language). XML-based, browser-based SSO. Exchanges authentication data between IdP and SP. Common in enterprise. OAuth = authorization (not SSO). OpenID Connect = modern identity layer on OAuth."}, {"cat": "Engineering", "q": "Log in once, access email, HR portal, and project tools without re-authenticating. What is this?", "a": "SSO (Single Sign-On). One login for multiple applications. Reduces password fatigue. Usually implemented via SAML or OAuth/OIDC behind the scenes. Convenience + security (fewer passwords to manage/forget)."}, {"cat": "Engineering", "q": "Using a password AND a fingerprint scan to log in. What type of authentication?", "a": "MFA (Multi-Factor Authentication). Two DIFFERENT factor types: something you know (password) + something you are (biometric). Two passwords = NOT MFA (same factor type). Factors: know, have, are."}, {"cat": "Engineering", "q": "Pen tester's laptop fails NAC (Network Access Control) health check. How to bypass?", "a": "Spoof MAC address of a VoIP phone or printer — they can't do NAC and are often allowlisted. Other options: use IPv6 (admins often only configure NAC for IPv4), or set up a rogue wireless AP."}, {"cat": "Engineering", "q": "RADIUS vs TACACS+: which encrypts the entire packet?", "a": "TACACS+ encrypts ENTIRE packet (TCP, Cisco-favored, separates auth/authz/accounting). RADIUS only encrypts PASSWORD (UDP, common for network access). 'Full encryption' = TACACS+."}, {"cat": "Engineering", "q": "Endpoint security creating alerts from SIGNATURE RULES matching known malicious activity. HIDS or EDR?", "a": "HIDS (Host-based Intrusion Detection System). Signature rules = KNOWN threats = alerts. EDR (Endpoint Detection & Response) = behavioral/ML = UNKNOWN threats = detect + respond. 'Signature' = HIDS."}, {"cat": "Engineering", "q": "What prevents unauthorized data from leaving an organization by monitoring data at rest, in transit, and in use?", "a": "DLP (Data Loss Prevention). Pattern matching on sensitive data (SSN formats, credit card numbers). Monitors email, file transfers, USB, cloud uploads. 'Prevent data leaving' = DLP."}, {"cat": "Engineering", "q": "DLP alert on files matching SSN format (xxx-xx-xxxx). Which DLP detection method?", "a": "Exact Data Match (EDM). Pattern matching on structured data FORMAT. Document matching = whole docs. Statistical = ML analysis. Classification = tags/labels (Secret, Public). 'SSN pattern' = EDM."}, {"cat": "Engineering", "q": "Escape room needs doors/windows each with unique custom logic programmed during installation. FPGA, ASIC, IoT, or SoC?", "a": "FPGA (Field Programmable Gate Array). Customer programs logic AFTER manufacture. ASIC = fixed at manufacture. IoT = networked smart devices (Zigbee). SoC = entire computer on one chip."}, {"cat": "Engineering", "q": "Hub/control system manages lights, HVAC, power using Zigbee wireless. What technology?", "a": "IoT (Internet of Things). Smart devices networked via Zigbee/Z-Wave. Not FPGA (custom logic), ASIC (fixed chips), or SoC (all-in-one processor)."}, {"cat": "Engineering", "q": "After ransomware modified IoT firmware, what should future devices have to prevent unauthorized firmware execution?", "a": "Hardware Root of Trust / TPM (Trusted Platform Module). Verifies firmware integrity during secure boot. Only validated firmware can run. Prevents malicious firmware at hardware level."}, {"cat": "Engineering", "q": "What's the difference between TPM (Trusted Platform Module) and HSM (Hardware Security Module)?", "a": "TPM = chip ON the motherboard, stores keys, secure boot, hardware root of trust. HSM = DEDICATED external device for enterprise key management, higher performance, FIPS-validated. TPM = built-in. HSM = standalone enterprise-grade."}, {"cat": "Engineering", "q": "ICS (Industrial Control System) that monitors and controls infrastructure like power grids and pipelines over large geographic areas. What is it?", "a": "SCADA (Supervisory Control & Data Acquisition). A type of ICS designed for large-area monitoring/control. Uses RTUs (Remote Terminal Units) at remote sites. Common target for nation-state attacks."}, {"cat": "Engineering", "q": "Need to verify a file wasn't altered, but DON'T need to prove who created it. Hashing or digital signature?", "a": "Hashing. Unique digest — if file changes, hash changes. INTEGRITY only. Digital signature = integrity + authentication + non-repudiation. 'Was it altered?' only = hashing."}, {"cat": "Engineering", "q": "Company sends contracts needing to verify documents weren't altered AND prove sender identity for non-repudiation. Hashing or digital signature?", "a": "Digital Signature. Integrity + authentication + NON-REPUDIATION. Hashing = integrity only, no sender proof. 'Non-repudiation' always = digital signature."}, {"cat": "Engineering", "q": "App submitted to App Store with publisher certificate. Device checks hash on download. Code signing or digital signature?", "a": "Code Signing. A digital signature applied to SOFTWARE specifically. Exam wants MOST SPECIFIC answer. Software + cert + download integrity = Code Signing."}, {"cat": "Engineering", "q": "Which asymmetric algorithm matches RSA security with much smaller key sizes?", "a": "ECDSA (Elliptic Curve Digital Signature Algorithm). 256-bit ECC ≈ 3072-bit RSA. Elliptic curve math = same security, less overhead."}, {"cat": "Engineering", "q": "Public ledger of transactional records secured by cryptography. Blockchain or homomorphic encryption?", "a": "Blockchain. 'Public ledger' + 'transactions' = blockchain. Homomorphic = compute on encrypted data WITHOUT decrypting. Completely different concepts."}, {"cat": "Engineering", "q": "What lets you compute on encrypted data without decrypting it first?", "a": "Homomorphic Encryption. Process encrypted data, get encrypted results. Useful for cloud computing on sensitive data without exposing it. 'Compute without decrypting' = homomorphic."}, {"cat": "Engineering", "q": "OCSP (Online Certificate Status Protocol) vs CRL (Certificate Revocation List)?", "a": "CRL = downloadable LIST of all revoked certs (can be large, may be stale). OCSP = real-time query for ONE cert (faster, current). OCSP preferred for speed. CRL simpler but slower."}, {"cat": "Engineering", "q": "A cert for *.example.com — what type and what's the risk?", "a": "Wildcard certificate. Secures domain + all subdomains. Risk: if the key is compromised, ALL subdomains are compromised. Saves management but concentrates risk."}, {"cat": "Engineering", "q": "What ensures that if a server's private key is stolen, previously recorded encrypted sessions CAN'T be decrypted?", "a": "Perfect Forward Secrecy (PFS). Each session uses unique ephemeral keys (Diffie-Hellman). Compromised long-term key can't decrypt past sessions. Without PFS, captured traffic could be decrypted retroactively."}, {"cat": "Engineering", "q": "Two parties need to establish a shared secret over an insecure channel without pre-sharing keys. What algorithm?", "a": "Diffie-Hellman (DH) key exchange. Allows two parties to create a shared secret over an insecure channel. Foundation for PFS. ECDH = elliptic curve variant (more efficient)."}, {"cat": "Engineering", "q": "IPSec Transport vs Tunnel mode — which encrypts the entire original packet?", "a": "Tunnel mode = encrypts ENTIRE packet (headers + data), wraps in new packet. Site-to-site VPNs. Transport mode = encrypts PAYLOAD only. End-to-end between hosts. Tunnel = more secure."}, {"cat": "Engineering", "q": "IPSec: AH (Authentication Header) vs ESP (Encapsulating Security Payload)?", "a": "AH = authentication + integrity only (NO encryption). ESP = authentication + integrity + ENCRYPTION. ESP far more common — provides confidentiality. AH only proves packet wasn't tampered."}, {"cat": "Engineering", "q": "Organization requires TLS or IPSec for all network communications. Data in transit, at rest, or in use?", "a": "Data in transit. TLS/IPSec protect data moving over networks. At rest = disk encryption (BitLocker). In use = data in RAM (Intel SGX, secure enclaves)."}, {"cat": "Engineering", "q": "Donating old Self-Encrypting Drives (SEDs). Fastest + most secure sanitization?", "a": "Cryptographic Erase. Destroys encryption key — data instantly unreadable. Designed for SEDs. Secure erase = slower. Zero-fill/overwrite = for non-encrypted drives. Degaussing = magnetic media."}, {"cat": "Engineering", "q": "University researching medical data wants to prevent PHI release. Patient identities unneeded. What technique?", "a": "Tokenization. Replace PHI with random tokens, originals in separate vault. De-identifies data for safe research use. If identities unneeded = tokenize before processing."}, {"cat": "Engineering", "q": "What technique hides a secret message within an ordinary-looking image, audio file, or document?", "a": "Steganography. Conceals data WITHIN other data (images, audio, video). Different from encryption (which scrambles data visibly). Steganography = hiding the EXISTENCE of the message. Encryption = hiding the CONTENT."}, {"cat": "GRC", "q": "Quarterly PCI-DSS check to see if risk level changed. Which lifecycle phase: Identify, Assess, Control, or Review?", "a": "REVIEW. Periodic re-evaluation = Review. Phases: 1) Identify → 2) Assess (first time) → 3) Control (mitigate) → 4) Review (re-check). 'Quarterly' + 'changed' = Review."}, {"cat": "GRC", "q": "First-ever vuln scan classifies results as low/medium/high. Which phase?", "a": "ASSESS. First-time analysis and classification = Assess. Re-checking = Review. First time = Assess. Recurring = Review."}, {"cat": "GRC", "q": "COO purchases data breach insurance. Which risk response?", "a": "Transference. Shifting risk to third party (insurance). Avoidance = stop activity. Mitigation = add controls. Acceptance = do nothing."}, {"cat": "GRC", "q": "Quantitative vs qualitative risk analysis?", "a": "Quantitative = NUMBERS (ALE, SLE, ARO, dollar values). Qualitative = RATINGS (high/medium/low, risk matrices). Quantitative = precise but needs data. Qualitative = faster but subjective."}, {"cat": "GRC", "q": "What identifies which business functions are MOST CRITICAL and determines impact of disruption?", "a": "BIA (Business Impact Analysis). Establishes RTOs/RPOs for each system. Answers: 'If this goes down, how bad is it?' Done BEFORE writing BCP/DRP."}, {"cat": "GRC", "q": "Hospital pen test — which are compliance priorities: cleartext LDAP, PHI over HTTP, cookie manipulation, or DB data-at-rest?", "a": "PHI over HTTP + data-at-rest on DB. Hospital = HIPAA = PHI focus. Both directly protect PHI (transmission + storage). Match scan priorities to the SPECIFIC regulation."}, {"cat": "GRC", "q": "German company uses emails (collected for account IDs) for marketing without separate consent. GDPR violation?", "a": "YES. GDPR requires SEPARATE explicit consent for each purpose. Data for accounts ≠ consent for marketing. Purpose limitation = core GDPR principle."}, {"cat": "GRC", "q": "Setting up credit card processing. Most important compliance?", "a": "PCI-DSS (Payment Card Industry Data Security Standard). Any company storing/processing/transmitting cardholder data. Not HIPAA (healthcare), GDPR (EU data), SOX (financial reporting)."}, {"cat": "GRC", "q": "Best framework for multi-cloud security: ISO 27001, COBIT, CSA, or NIST CSF?", "a": "CSA (Cloud Security Alliance). Cloud-specific security. ISO 27001 = general infosec. COBIT = IT governance. NIST CSF = broad cybersecurity. Cloud = CSA."}, {"cat": "GRC", "q": "What is the primary objective of the DMA (Digital Markets Act)?", "a": "EU regulation ensuring FAIR COMPETITION in digital marketplace. Targets 'gatekeeper' platforms (big tech). Not HIPAA (health), SOX (financial reporting), NIST (cybersecurity framework)."}, {"cat": "GRC", "q": "Name the data roles: owner, custodian, steward, controller, processor.", "a": "Owner = executive, sets policies. Custodian = implements security (IT). Steward = data quality/compliance. Controller (GDPR) = determines processing purpose. Processor (GDPR) = processes on controller's behalf."}, {"cat": "GRC", "q": "What's due diligence vs due care?", "a": "Due diligence = RESEARCHING risks (investigation). Due care = ACTING on known risks (implementation). Diligence = 'we studied it.' Care = 'we did something.' Both required to avoid negligence."}, {"cat": "GRC", "q": "What are AUP, NDA, SLA, MOU, and BPA?", "a": "AUP = Acceptable Use Policy (rules for company resources). NDA = Non-Disclosure Agreement (confidentiality). SLA = Service Level Agreement (performance guarantees). MOU = Memorandum of Understanding (informal). BPA = Business Partner Agreement (partner responsibilities)."}, {"cat": "GRC", "q": "What is SCRM (Supply Chain Risk Management) and why does it matter?", "a": "Identifies/mitigates risks from suppliers and vendors. Attackers target weakest link — compromised vendors (SolarWinds) affect thousands of customers. Vendor assessments, contracts, monitoring."}, {"cat": "GRC", "q": "What evaluates how a new system collects, uses, and shares personal information before deployment?", "a": "PIA (Privacy Impact Assessment). Identifies privacy risks and recommends mitigations. Required by GDPR/HIPAA before deploying systems handling personal data."}, {"cat": "GRC", "q": "Software released with serious vulns. Retrofit costs $100K. Which framework prevents this?", "a": "DevSecOps. Security built INTO development from START. DevOps = no security. Agile = iterative, not inherently secure. 'Security during development' = DevSecOps."}, {"cat": "GRC", "q": "SDLC Waterfall — 7 phases in order?", "a": "Planning → Requirements → Design → Implementation → Testing → Deployment → Maintenance. P-R-D-I-T-D-M. 'Please Remember Doing It Takes Daily Motivation.' PLANNING first, always."}, {"cat": "GRC", "q": "Code releases twice daily. CI/CD, Waterfall, or Spiral?", "a": "CI/CD (Continuous Integration / Continuous Delivery). Automated testing + rapid deployment. Waterfall/Spiral = too slow for daily releases."}, {"cat": "GRC", "q": "Testing that components work correctly TOGETHER. Unit, integration, regression, or canary?", "a": "Integration testing. Components TOGETHER. Unit = isolated. Regression = didn't break existing. Canary = small subset first."}, {"cat": "GRC", "q": "2,592 vuln findings on PHI systems. CISO wants a plan. What first?", "a": "Filter for CRITICAL items on PHI assets, remediate FIRST. Prioritize by risk to regulated data. Don't fix all at once. Don't stop scanning. Don't sandbox (removes from production)."}, {"cat": "GRC", "q": "Server upgrades cause app issues. How to prevent?", "a": "TEST LAB. Validate all patches before production deployment. Automated patching helps but patches must be TESTED first."}, {"cat": "GRC", "q": "A vulnerability report should include physical hosts AND what else to be accurate?", "a": "Virtual hosts. Common mistake: only scanning physical hosts, missing VMs, containers, cloud instances. Report must include ALL assets — physical AND virtual."}, {"cat": "GRC", "q": "What is a change control board (CCB) and why does it matter?", "a": "A CCB reviews and approves/rejects proposed changes to systems before implementation. Prevents unauthorized or untested changes. Part of change management process. Ensures changes are documented, tested, and authorized."}];

const CATS=[...new Set(CARDS.map(c=>c.cat))];
const CC={"Architecture":{bg:"#dbeafe",bd:"#3b82f6",tx:"#1e3a5f",badge:"#3b82f6"},"SecOps":{bg:"#fee2e2",bd:"#ef4444",tx:"#7f1d1d",badge:"#ef4444"},"Engineering":{bg:"#d1fae5",bd:"#10b981",tx:"#064e3b",badge:"#10b981"},"GRC":{bg:"#fef3c7",bd:"#f59e0b",tx:"#92400e",badge:"#f59e0b"}};
const CF={"Architecture":"Domain 1: Security Architecture (33%)","SecOps":"Domain 2: Security Operations (30%)","Engineering":"Domain 3: Sec Engineering & Crypto (20%)","GRC":"Domain 4: GRC (17%)"};
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
let S={mode:"menu",sel:new Set(CATS),pick:false,deck:[],idx:0,flip:false,knew:new Set(),miss:new Set(),gMiss:new Set()};
function fc(){return CARDS.filter(c=>S.sel.has(c.cat)).length}
function start(mo){let cards;if(mo){cards=[...S.gMiss].map(i=>CARDS[i]).filter(c=>S.sel.has(c.cat))}else{cards=CARDS.filter(c=>S.sel.has(c.cat))}if(!cards.length)return;S.deck=shuffle(cards);S.idx=0;S.flip=false;S.knew=new Set();S.miss=new Set();S.mode="study";render()}
function know(){const g=CARDS.indexOf(S.deck[S.idx]);S.knew.add(g);S.gMiss.delete(g);adv()}
function miss(){const g=CARDS.indexOf(S.deck[S.idx]);S.miss.add(g);S.gMiss.add(g);adv()}
function adv(){if(S.idx+1>=S.deck.length)S.mode="results";else{S.idx++;S.flip=false}render()}
function togCat(c){if(S.sel.has(c)){if(S.sel.size>1)S.sel.delete(c)}else S.sel.add(c);render()}
function selAll(){S.sel=new Set(CATS);render()}
function render(){const a=document.getElementById("app");if(S.mode==="menu")rMenu(a);else if(S.mode==="study")rStudy(a);else rRes(a)}
function rMenu(el){const g=S.gMiss.size;el.innerHTML=`<div class="menu"><div class="logo"><div class="logo-sub">CompTIA</div><div class="logo-main">SecurityX</div><div class="logo-desc">CAS-005 Flashcard Drill</div><div class="logo-bar"></div></div><div class="stat-row"><div class="stat-box"><div class="stat-num">${CARDS.length}</div><div class="stat-label">TOTAL CARDS</div></div><div class="stat-box"><div class="stat-num">4</div><div class="stat-label">DOMAINS</div></div><div class="stat-box"><div class="stat-num">${g}</div><div class="stat-label">TO REVIEW</div></div></div><div class="cat-box"><div class="cat-header"><span class="cat-label">Domains (${S.sel.size}/${CATS.length})</span><div class="cat-btns"><button onclick="selAll()">All</button><button onclick="S.pick=!S.pick;render()">${S.pick?"Hide":"Pick"}</button></div></div>${S.pick?`<div class="cat-grid">${CATS.map(c=>{const n=CARDS.filter(x=>x.cat===c).length;return`<div class="cat-tag ${S.sel.has(c)?'active':''}" style="${S.sel.has(c)?`background:${CC[c].badge};border-color:${CC[c].badge}`:''}" onclick="togCat('${c}')">${CF[c]} (${n})</div>`}).join("")}</div>`:""}<div class="cat-count">${fc()} cards selected</div></div><button class="btn-start" onclick="start(false)">Start Drill (${fc()} cards)</button>${g>0?`<button class="btn-missed" onclick="start(true)">Review Missed Only (${g} cards)</button>`:""}<div class="shortcuts"><b>Keyboard:</b> Space=flip · →/K=knew · ←/M=missed</div></div>`}
function rStudy(el){const c=S.deck[S.idx];const cl=CC[c.cat]||CC.Architecture;const p=(S.idx/S.deck.length)*100;el.innerHTML=`<div class="study"><div class="study-header"><button class="exit" onclick="S.mode='menu';render()">✕ Exit</button><span class="counter">${S.idx+1}/${S.deck.length}</span><div class="scores"><span class="g">✓${S.knew.size}</span><span class="r">✗${S.miss.size}</span></div></div><div class="progress-bar"><div class="progress-fill" style="width:${p}%"></div></div><div class="badge" style="background:${cl.badge}">${CF[c.cat]||c.cat}</div><div class="card ${S.flip?'answer':'question'}" style="${S.flip?`background:linear-gradient(145deg,${cl.bg},#fff);border-color:${cl.bd}`:''}" onclick="S.flip=!S.flip;render()">${!S.flip?`<div class="q-text">${c.q}</div><div class="tap-hint">tap to reveal</div>`:`<div class="a-label">Answer</div><div class="a-text" style="color:${cl.tx}">${c.a}</div>`}</div>${S.flip?`<div class="action-btns"><button class="btn-miss" onclick="miss()">✗ Missed</button><button class="btn-know" onclick="know()">✓ Knew it</button></div>`:""}</div>`}
function rRes(el){const t=S.deck.length;const k=S.knew.size;const m=S.miss.size;const p=t?Math.round(k/t*100):0;const e=p>=85?"🔥":p>=70?"💪":"📚";const mc=S.deck.filter((_,i)=>S.miss.has(CARDS.indexOf(S.deck[i])));el.innerHTML=`<div class="results"><div class="emoji">${e}</div><div class="pct">${p}%</div><div class="summary">${k} knew · ${m} missed · ${t} total</div><div class="result-bar"><div class="fill" style="width:0%"></div></div>${m>0?`<div class="missed-box"><div class="label">Missed cards:</div>${mc.map(c=>`<div class="item" style="border-color:${CC[c.cat]?.badge||'#666'}"><span class="cat">[${CF[c.cat]||c.cat}]</span> ${c.q.substring(0,90)}${c.q.length>90?"...":""}</div>`).join("")}</div>`:""}<div class="result-btns"><button class="btn-back" onclick="S.mode='menu';render()">Menu</button>${m>0?`<button class="btn-retry" onclick="start(true)">Drill Missed (${m})</button>`:""}</div></div>`;setTimeout(()=>{const f=document.querySelector('.result-bar .fill');if(f)f.style.width=p+'%'},50)}
document.addEventListener("keydown",e=>{if(S.mode!=="study")return;if(e.key===" "||e.key==="Enter"){e.preventDefault();S.flip=!S.flip;render()}if((e.key==="ArrowRight"||e.key==="k")&&S.flip)know();if((e.key==="ArrowLeft"||e.key==="m")&&S.flip)miss()});
render();
</script></body></html>

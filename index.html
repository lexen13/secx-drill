.missed-box{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:14px;margin-bottom:16px;text-align:left}
.missed-box .label{color:#fca5a5;font-size:12px;font-weight:600;margin-bottom:8px}
.missed-box .item{color:#cbd5e1;font-size:11px;margin-bottom:5px;padding-left:8px;border-left:2px solid;line-height:1.4}
.missed-box .item .cat{color:#64748b;font-size:10px}
.result-btns{display:flex;gap:10px;width:100%;margin-top:8px;padding-bottom:16px}

<script>
const CARDS=[
// RISK & GRC
{cat:"Risk & GRC",q:"What is BCP (Business Continuity Plan)?",a:"Broad plan for how a business keeps operating DURING a disruption. Covers people, processes, partners — the whole business."},
{cat:"Risk & GRC",q:"What is DRP (Disaster Recovery Plan)?",a:"Specific plan for resuming work AFTER a disaster (fire, flood, outage). Narrower than BCP — focuses on IT recovery."},
{cat:"Risk & GRC",q:"BCP vs DRP: Building unusable for 3 months after a fire?",a:"DRP (Disaster Recovery Plan). You're recovering FROM a specific disaster. BCP is the broader plan for continuing the business."},
{cat:"Risk & GRC",q:"What is IRP (Incident Response Plan)?",a:"Step-by-step instructions for detecting, responding to, and recovering from security incidents like breaches, malware, or data loss."},
{cat:"Risk & GRC",q:"What is RTO (Recovery Time Objective)?",a:"Maximum acceptable TIME to restore a system after failure. Example: 'We need email back within 4 hours.'"},
{cat:"Risk & GRC",q:"What is RPO (Recovery Point Objective)?",a:"Maximum acceptable DATA LOSS measured in time. Example: 'We can lose up to 1 hour of data.' Determines backup frequency."},
{cat:"Risk & GRC",q:"RTO vs RPO?",a:"RTO = max TIME to restore systems. RPO = max DATA LOSS (measured in time). RTO is about downtime, RPO is about data."},
{cat:"Risk & GRC",q:"What is MTBF (Mean Time Between Failures)?",a:"Average time a device works BEFORE it fails. Higher = more reliable. The 183 days before a router dies = MTBF."},
{cat:"Risk & GRC",q:"What is MTTR (Mean Time To Repair)?",a:"Average time to FIX something once broken. Lower = faster repairs. Fixed the router in 4 hours = MTTR."},
{cat:"Risk & GRC",q:"ALE (Annual Loss Expectancy) formula?",a:"ALE = SLE × ARO. SLE (Single Loss Expectancy) = Asset Value × Exposure Factor. ARO (Annual Rate of Occurrence) = 1/years."},
{cat:"Risk & GRC",q:"$3.125M asset, 60% exposure, once every 20 years. ALE?",a:"SLE = $3,125,000 × 0.60 = $1,875,000. ARO = 1/20 = 0.05. ALE = $1,875,000 × 0.05 = $93,750/year."},
{cat:"Risk & GRC",q:"What is ROI (Return on Investment)?",a:"Money saved after investing. ROI = (total savings over time) − (system cost). Higher ROI = better value. Read carefully: 'lowest' vs 'highest.'"},
{cat:"Risk & GRC",q:"Risk Management Lifecycle — 4 phases in order?",a:"1) Identify (inventory assets) → 2) Assess (analyze risk FIRST TIME) → 3) Control (implement mitigations) → 4) Review (periodic re-evaluation)."},
{cat:"Risk & GRC",q:"Assess vs Review: Quarterly PCI-DSS check to see if risk changed?",a:"REVIEW. Periodic re-evaluation = Review. First-time classification = Assess. Keywords: 'quarterly' + 'has changed' = Review."},
{cat:"Risk & GRC",q:"Name the 4 risk responses.",a:"Avoidance (stop activity), Transference (shift to 3rd party — insurance), Mitigation (reduce with controls — patching), Acceptance (do nothing)."},
{cat:"Risk & GRC",q:"Buying data breach insurance = which risk response?",a:"Transference. Shifting the financial risk to an insurance company (third party)."},

// COMPLIANCE
{cat:"Compliance",q:"What is PCI-DSS (Payment Card Industry Data Security Standard)?",a:"Compliance standard for any company that stores, processes, or transmits credit card data. Cardholder data protection."},
{cat:"Compliance",q:"What is HIPAA (Health Insurance Portability & Accountability Act)?",a:"US law protecting patient health data (PHI). Applies to hospitals, clinics, insurers, and their business associates."},
{cat:"Compliance",q:"PHI (Protected Health Information) vs PII (Personally Identifiable Info)?",a:"PHI = medical/insurance records, lab results (health-specific). PII = SSN, name, DOB, email, biometrics (identifies any person)."},
{cat:"Compliance",q:"What is GDPR (General Data Protection Regulation)?",a:"EU regulation protecting EU citizens' personal data. Requires EXPLICIT consent for each specific use of data. Purpose limitation."},
{cat:"Compliance",q:"What is DMA (Digital Markets Act)?",a:"EU regulation ensuring fair competition in digital marketplace. Targets large 'gatekeeper' platforms to prevent monopolistic practices."},
{cat:"Compliance",q:"What is SOX (Sarbanes-Oxley Act)?",a:"US law for financial reporting standards and fraud prevention in publicly traded companies."},
{cat:"Compliance",q:"What is CSA (Cloud Security Alliance)?",a:"Framework with standards and best practices specifically for CLOUD security. Best choice for multi-cloud environments."},
{cat:"Compliance",q:"Cloud security across multiple providers — which framework?",a:"CSA (Cloud Security Alliance). Not NIST CSF (too broad), not ISO 27001 (general infosec), not COBIT (IT governance)."},
{cat:"Compliance",q:"Hospital pen test — what to scan for?",a:"HIPAA compliance = focus on PHI protection. PHI over HTTP (insecure transit) + data at rest on DB. Match scan to the REGULATION."},

// ACCESS CONTROLS
{cat:"Access Control",q:"What is MAC (Mandatory Access Control)?",a:"STRONGEST model. System enforces via classification LABELS (Secret, Top Secret). Users CANNOT override. Military/classified environments."},
{cat:"Access Control",q:"What is RBAC (Role-Based Access Control)?",a:"Access based on your ROLE/JOB. Users assigned to roles, roles have permissions. Non-discretionary — users can't change their own access."},
{cat:"Access Control",q:"What is ABAC (Attribute-Based Access Control)?",a:"Most FLEXIBLE model. Access based on attributes: user, resource, environment (time, location). 'Allow if dept=HR AND time=business_hours.'"},
{cat:"Access Control",q:"What is DAC (Discretionary Access Control)?",a:"WEAKEST model. OWNER of a resource decides who gets access. Users CAN modify permissions on their own files. Windows file sharing."},
{cat:"Access Control",q:"Rank access controls by strength:",a:"MAC (strongest) > RBAC > DAC (weakest). 'Strongest' on the exam ALWAYS = MAC (Mandatory Access Control)."},

// AUTH
{cat:"Authentication",q:"What is HOTP (HMAC-based One-Time Password)?",a:"One-time code using shared secret + COUNTER. Each press = new code. Does NOT expire. Counter-based, valid until used."},
{cat:"Authentication",q:"What is TOTP (Time-based One-Time Password)?",a:"One-time code using shared secret + current TIME. New code every 30-60 seconds. DOES expire. Google Authenticator."},
{cat:"Authentication",q:"HOTP vs TOTP: 'Does not expire'?",a:"HOTP (HMAC-based One-Time Password). H = Holds forever. T = Time Ticks (expires)."},
{cat:"Authentication",q:"What is EAP (Extensible Authentication Protocol)?",a:"A FRAMEWORK for authentication — NOT a one-time password. Used in 802.1X / Wi-Fi enterprise auth with RADIUS."},
{cat:"Authentication",q:"What is OAuth (Open Authorization)?",a:"AUTHORIZATION framework (not authentication). Lets apps access your resources WITHOUT sharing your password. Uses tokens."},
{cat:"Authentication",q:"What is SAML (Security Assertion Markup Language)?",a:"XML-based protocol for SSO (Single Sign-On). Exchanges auth data between identity provider and service provider."},
{cat:"Authentication",q:"What is NAC (Network Access Control)?",a:"Checks device health/compliance BEFORE allowing network access. Bypass: spoof VoIP MAC, use IPv6, rogue AP."},
{cat:"Authentication",q:"What is MFA (Multi-Factor Authentication)?",a:"Using 2+ DIFFERENT factor types: something you know (password), have (token), are (biometric). Two passwords ≠ MFA."},
{cat:"Authentication",q:"RADIUS vs TACACS+?",a:"RADIUS: UDP, encrypts password only. TACACS+: TCP, encrypts ENTIRE packet, Cisco-favored, separates auth/authz/accounting."},

// DETECTION
{cat:"Detection Systems",q:"What is HIDS (Host-based Intrusion Detection System)?",a:"Monitors ONE host. Uses SIGNATURE RULES to match KNOWN threats. ALERTS only — does not block. 'Signature rules' = HIDS."},
{cat:"Detection Systems",q:"What is EDR (Endpoint Detection & Response)?",a:"Software AGENT on endpoint. BEHAVIORAL analysis + ML for threat detection. More advanced than HIDS. 'Behavioral/ML' = EDR."},
{cat:"Detection Systems",q:"HIDS vs EDR: 'Alerts based on signature rules matching known malicious activity'?",a:"HIDS (Host-based Intrusion Detection System). HIDS = signature rules. EDR = behavioral/ML. 'Signature' is the giveaway."},
{cat:"Detection Systems",q:"IDS (Intrusion Detection) vs IPS (Intrusion Prevention)?",a:"IDS = DETECTION only (alerts, passive, tap/span). IPS = PREVENTION (blocks, inline, active). H = host, N = network."},
{cat:"Detection Systems",q:"What is SIEM (Security Information & Event Management)?",a:"CENTRALIZED log collection + correlation from all sources. Dashboards, alerts, compliance reporting. Provides visibility — does NOT block."},
{cat:"Detection Systems",q:"What is SOAR (Security Orchestration, Automation & Response)?",a:"Automates incident response workflows. Integrates with SIEM to take ACTION on alerts. Playbook-driven automation."},
{cat:"Detection Systems",q:"What is UEBA (User & Entity Behavior Analytics)?",a:"Uses ML/AI to build BASELINES of normal behavior, then detects ANOMALIES. Focuses on user behavior patterns and deviations."},
{cat:"Detection Systems",q:"What is DLP (Data Loss Prevention)?",a:"Prevents unauthorized data from leaving the org. Monitors data at rest, in transit, in use. Pattern matching on sensitive data."},
{cat:"Detection Systems",q:"Best IPS mode for INITIAL deployment?",a:"Inline + Alert-Only. Tune rules without blocking legitimate traffic first. Then enforce blocking after tuning."},
{cat:"Detection Systems",q:"Signature vs Anomaly: Zero-day threats?",a:"Anomaly-based. Signature only detects KNOWN threats. Anomaly builds baseline and catches unknown/zero-day deviations."},
{cat:"Detection Systems",q:"DLP: SSN format pattern matching (xxx-xx-xxxx)?",a:"Exact Data Match (EDM). Structured pattern. Document matching = whole docs. Statistical = ML. Classification = labels/tags."},

// NETWORK & CLOUD
{cat:"Network & Cloud",q:"What is SDN (Software-Defined Networking)?",a:"Separates control plane from data plane. Manage network via software instead of configuring each device individually."},
{cat:"Network & Cloud",q:"What is Hybrid SDN?",a:"Mix of traditional + SDN in SAME environment. Keeps existing hardware AND adds SDN. 'Don't want to abandon current devices' = Hybrid."},
{cat:"Network & Cloud",q:"What is SDN Overlay?",a:"Virtual networks ON TOP of existing hardware. Hardware still there but NO LONGER directly managed by admins."},
{cat:"Network & Cloud",q:"Hybrid SDN vs SDN Overlay: 'Keep existing + add new'?",a:"Hybrid SDN. Combines old + new, both managed. Overlay virtualizes on top and replaces management of existing hardware."},
{cat:"Network & Cloud",q:"What is SD-WAN (Software-Defined Wide Area Network)?",a:"Software-based WAN management. Dynamic traffic routing, cloud security integration. Best for remote/distributed orgs."},
{cat:"Network & Cloud",q:"Deperimeterized network + cloud security integration?",a:"SD-WAN (Software-Defined WAN). Not just a dynamic routing protocol — SD-WAN integrates with cloud security tools."},
{cat:"Network & Cloud",q:"Non-HTTP traffic on port 80 — which firewall?",a:"Application-Aware Firewall / NGFW (Layer 7). Inspects packet CONTENTS. Stateless/stateful (L3-4) only see headers."},
{cat:"Network & Cloud",q:"What is Micro-Segmentation?",a:"Divides network into tiny isolated segments with strict access controls per workload. Prevents lateral movement."},
{cat:"Network & Cloud",q:"What is Zero Trust?",a:"'Never trust, always verify.' Verify user + device identity for EVERY session. No implicit trust based on network location."},
{cat:"Network & Cloud",q:"IaaS vs PaaS vs SaaS vs DaaS?",a:"IaaS = manage OS/apps (EC2). PaaS = manage apps only (Heroku). SaaS = provider manages all (Gmail). DaaS = virtual desktop (WorkSpaces)."},
{cat:"Network & Cloud",q:"'Servers/switches provisioned over internet'?",a:"IaaS (Infrastructure as a Service). Raw infrastructure — you manage everything on top."},
{cat:"Network & Cloud",q:"Horizontal vs Vertical Scaling?",a:"Horizontal = add MORE servers. Vertical = add resources to EXISTING server. Autoscaling = automatic either way."},
{cat:"Network & Cloud",q:"What is a VPC (Virtual Private Cloud)?",a:"Your own isolated private network within a cloud provider (AWS/Azure/GCP). Like your own data center in the cloud."},
{cat:"Network & Cloud",q:"What is a DMZ (Demilitarized Zone)?",a:"Network segment between internal and internet. Hosts public-facing servers (web, email, FTP)."},

// CRYPTO
{cat:"Cryptography",q:"Hashing provides what security property?",a:"INTEGRITY only. Proves data wasn't altered. Cannot prove who sent it. One-way function. SHA-256, MD5."},
{cat:"Cryptography",q:"Digital Signature provides what?",a:"Integrity + Authentication + NON-REPUDIATION. Hash data, encrypt hash with sender's PRIVATE key. Proves WHO sent it."},
{cat:"Cryptography",q:"Hashing vs Digital Sig: Need non-repudiation?",a:"Digital Signature. Hashing = integrity only. Digital sig = integrity + auth + non-repudiation (proves sender, can't deny)."},
{cat:"Cryptography",q:"What is Code Signing?",a:"Digital signature applied specifically to SOFTWARE/CODE. Verifies publisher identity + code integrity on download. More SPECIFIC than 'digital signature.'"},
{cat:"Cryptography",q:"Code Signing vs Digital Sig: App with publisher cert?",a:"Code Signing. It's a TYPE of digital sig, but exam wants MOST SPECIFIC. Software distribution = code signing."},
{cat:"Cryptography",q:"What is Non-Repudiation?",a:"Proof someone DID send something — they cannot deny it. Achieved through digital signatures (hash encrypted with private key)."},
{cat:"Cryptography",q:"Symmetric vs Asymmetric Encryption?",a:"Symmetric = SAME key (AES, fast, key sharing problem). Asymmetric = TWO keys: public + private (RSA, ECC, slower)."},
{cat:"Cryptography",q:"What is ECDSA (Elliptic Curve Digital Signature Algorithm)?",a:"Asymmetric algorithm using elliptic curves. Same security as RSA with MUCH smaller key sizes."},
{cat:"Cryptography",q:"What is Blockchain?",a:"Public LEDGER of transactional records secured by cryptography. 'Public ledger' = blockchain, NOT homomorphic encryption."},
{cat:"Cryptography",q:"What is Homomorphic Encryption?",a:"Compute on ENCRYPTED data WITHOUT decrypting it first. 'Compute without decrypting' = homomorphic."},
{cat:"Cryptography",q:"Blockchain vs Homomorphic: 'Public ledger of transactions'?",a:"Blockchain. Homomorphic = compute on encrypted data. 'Public ledger' is the dead giveaway."},
{cat:"Cryptography",q:"Best sanitization for SED (Self-Encrypting Drives)?",a:"Cryptographic Erase. Destroy the encryption key — all data unreadable instantly. Fastest + most secure for SEDs."},
{cat:"Cryptography",q:"What is Tokenization?",a:"Replace sensitive data with random tokens. Original stored in token vault. De-identification. Good for PHI in research."},
{cat:"Cryptography",q:"Data in Transit vs At Rest vs In Use?",a:"Transit = network (TLS, IPSec). Rest = disk (BitLocker, encryption). Use = RAM/CPU (Intel SGX, secure enclaves)."},

// OT & HARDWARE
{cat:"OT & Hardware",q:"What is FPGA (Field Programmable Gate Array)?",a:"Processor you PROGRAM YOURSELF after manufacture. Customer writes the logic. Reprogrammable for specific use cases."},
{cat:"OT & Hardware",q:"What is ASIC (Application-Specific Integrated Circuit)?",a:"Processor for ONE purpose, fixed AT MANUFACTURE. Cannot reprogram. Expensive. Example: Ethernet switch chips."},
{cat:"OT & Hardware",q:"FPGA vs ASIC vs IoT: 'Program specific function during installation'?",a:"FPGA (Field Programmable Gate Array). 'Customer programs' = FPGA. 'Fixed' = ASIC. 'Smart devices + Zigbee' = IoT."},
{cat:"OT & Hardware",q:"What is IoT (Internet of Things)?",a:"Network of smart devices with sensors and connectivity. Zigbee/Z-Wave protocols. Hub/control systems, wearables, sensors."},
{cat:"OT & Hardware",q:"What is SoC (System on a Chip)?",a:"Entire computer on ONE chip: CPU + GPU + memory + USB + wireless. Phone processors: Apple M-series, Snapdragon."},
{cat:"OT & Hardware",q:"What is TPM (Trusted Platform Module)?",a:"Hardware chip on motherboard for crypto operations. Stores encryption keys. Hardware ROOT OF TRUST for secure boot."},
{cat:"OT & Hardware",q:"What is HSM (Hardware Security Module)?",a:"Dedicated hardware DEVICE for managing/protecting crypto keys. Enterprise-grade key management. More robust than TPM."},
{cat:"OT & Hardware",q:"ICS (Industrial Control System) / SCADA?",a:"ICS = controls industrial processes. SCADA (Supervisory Control & Data Acquisition) = type of ICS monitoring infrastructure over large areas."},

// THREAT INTEL
{cat:"Threat Intel",q:"What is OSINT (Open-Source Intelligence)?",a:"Intel from PUBLIC sources: social media, forums, news, DNS records. Free/legal. Examples: VirusTotal, Shodan."},
{cat:"Threat Intel",q:"What is an IoC (Indicator of Compromise)?",a:"Evidence a breach occurred. HOST-based: malicious processes, file changes. ACCOUNT-based: failed logins, off-hours usage."},
{cat:"Threat Intel",q:"Host vs Account IoC: 'Malicious processes'?",a:"HOST-based IoC. Processes = running on the SYSTEM. Account-based = login/session/usage activity."},
{cat:"Threat Intel",q:"What is APT (Advanced Persistent Threat)?",a:"Sophisticated, long-term threat actor (nation-state). Obtains, maintains, diversifies access. DELIBERATE, never accidental."},
{cat:"Threat Intel",q:"Which threat actor can ACCIDENTALLY cause an incident?",a:"Insider Threat. Current/former employee with authorized access. Only type that can be 'inadvertent' or accidental."},
{cat:"Threat Intel",q:"What is a Zero-Day vulnerability?",a:"Flaw in software UNKNOWN to the vendor. No patch exists. 'Newly discovered flaw' = zero-day."},
{cat:"Threat Intel",q:"Compromised system — VirusTotal or local AV?",a:"VirusTotal (external OSINT). NEVER trust local tools on compromised system — AV itself may be compromised."},
{cat:"Threat Intel",q:"What is a Honeypot?",a:"Fake system to LURE attackers. Collects attack payloads and strategies without risking real production systems."},
{cat:"Threat Intel",q:"Disassembly vs Behavioral: 'Breaks down executable to analyze code'?",a:"Disassembly. Converting binary → readable code. Behavioral = watching SYSTEM CHANGES during execution."},
{cat:"Threat Intel",q:"Race Condition: 'Modify file BEFORE app reads it'?",a:"Race Condition. Outcome depends on TIMING. Keywords: 'before', 'between', 'while'. Not sensitive data exposure."},

// SOFTWARE DEV
{cat:"Software Dev",q:"SDLC (Software Development Lifecycle) Waterfall order?",a:"P-R-D-I-T-D-M: Planning → Requirements → Design → Implementation → Testing → Deployment → Maintenance. PLANNING always first."},
{cat:"Software Dev",q:"What is DevSecOps?",a:"Development + Security + Operations integrated. Security BUILT IN during dev. Prevents costly retrofits after release."},
{cat:"Software Dev",q:"DevSecOps vs DevOps?",a:"DevSecOps INCLUDES security. DevOps = Dev + Ops, does NOT include security. Security problems = DevSecOps."},
{cat:"Software Dev",q:"What is CI/CD (Continuous Integration / Continuous Delivery)?",a:"Code tested and deployed rapidly, frequently. Multiple releases/day. Automated testing pipeline."},
{cat:"Software Dev",q:"Unit vs Integration vs Regression vs Canary Testing?",a:"Unit = isolated. Integration = TOGETHER. Regression = didn't break existing. Canary = small subset first."},
{cat:"Software Dev",q:"What is XXE (XML External Entity)?",a:"Malicious XML references external files (e.g., /etc/passwd). Look for ENTITY + SYSTEM + file:/// in XML."},
{cat:"Software Dev",q:"Domain Controllers use which protocols?",a:"LDAP (Lightweight Directory Access Protocol) + Kerberos (authentication). NOT SMTP (email)."},
{cat:"Software Dev",q:"Content filter vs Firewall ACL for phishing domains?",a:"Content filter / web proxy block list. Domain blocking > IP blocking — attackers change IPs but domains persist."},
{cat:"Software Dev",q:"What is an ACL (Access Control List)?",a:"Rules on a firewall for allowing/denying traffic. Best practice: always end with implicit DENY statement."},
];

const CATS=[...new Set(CARDS.map(c=>c.cat))];
const CC={
"Risk & GRC":{bg:"#fef3c7",bd:"#f59e0b",tx:"#92400e",badge:"#f59e0b"},
"Compliance":{bg:"#dbeafe",bd:"#3b82f6",tx:"#1e3a5f",badge:"#3b82f6"},
"Access Control":{bg:"#fce7f3",bd:"#ec4899",tx:"#831843",badge:"#ec4899"},
"Authentication":{bg:"#e0e7ff",bd:"#6366f1",tx:"#312e81",badge:"#6366f1"},
"Detection Systems":{bg:"#d1fae5",bd:"#10b981",tx:"#064e3b",badge:"#10b981"},
"Network & Cloud":{bg:"#e0f2fe",bd:"#0ea5e9",tx:"#0c4a6e",badge:"#0ea5e9"},
"Cryptography":{bg:"#fae8ff",bd:"#a855f7",tx:"#581c87",badge:"#a855f7"},
"OT & Hardware":{bg:"#fff7ed",bd:"#f97316",tx:"#7c2d12",badge:"#f97316"},
"Threat Intel":{bg:"#fee2e2",bd:"#ef4444",tx:"#7f1d1d",badge:"#ef4444"},
"Software Dev":{bg:"#f0fdf4",bd:"#22c55e",tx:"#14532d",badge:"#22c55e"},
};

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}

let state={mode:"menu",selCats:new Set(CATS),showPicker:false,deck:[],idx:0,flipped:false,knew:new Set(),missed:new Set(),globalMissed:new Set(),missedOnly:false};

function filteredCount(){return CARDS.filter(c=>state.selCats.has(c.cat)).length}

function startStudy(missedOnly=false){
  let cards;
  if(missedOnly){cards=[...state.globalMissed].map(i=>CARDS[i]).filter(c=>state.selCats.has(c.cat))}
  else{cards=CARDS.filter(c=>state.selCats.has(c.cat))}
  if(!cards.length)return;
  state.deck=shuffle(cards);state.idx=0;state.flipped=false;state.knew=new Set();state.missed=new Set();state.mode="study";state.missedOnly=missedOnly;
  render();
}

function handleKnow(){const gi=CARDS.indexOf(state.deck[state.idx]);state.knew.add(gi);state.globalMissed.delete(gi);advance()}
function handleMiss(){const gi=CARDS.indexOf(state.deck[state.idx]);state.missed.add(gi);state.globalMissed.add(gi);advance()}
function advance(){if(state.idx+1>=state.deck.length){state.mode="results"}else{state.idx++;state.flipped=false}render()}

function toggleCat(cat){if(state.selCats.has(cat)){if(state.selCats.size>1)state.selCats.delete(cat)}else state.selCats.add(cat);render()}
function selectAll(){state.selCats=new Set(CATS);render()}

function render(){
const app=document.getElementById("app");
if(state.mode==="menu"){renderMenu(app)}
else if(state.mode==="study"){renderStudy(app)}
else{renderResults(app)}
}

function renderMenu(el){
const gc=state.globalMissed.size;
el.innerHTML=`<div class="menu">
<div class="logo"><div class="logo-sub">CompTIA</div><div class="logo-main">SecurityX</div><div class="logo-desc">CAS-005 Flashcard Drill</div><div class="logo-bar"></div></div>
<div class="cat-box">
<div class="cat-header"><span class="cat-label">Categories (${state.selCats.size}/${CATS.length})</span><div class="cat-btns"><button onclick="selectAll()">All</button><button onclick="state.showPicker=!state.showPicker;render()">${state.showPicker?"Hide":"Pick"}</button></div></div>
${state.showPicker?`<div class="cat-grid">${CATS.map(c=>`<div class="cat-tag ${state.selCats.has(c)?'active':''}" style="${state.selCats.has(c)?`background:${CC[c].badge};border-color:${CC[c].badge}`:''}" onclick="toggleCat('${c}')">${c}</div>`).join("")}</div>`:""}
<div class="cat-count">${filteredCount()} cards selected</div>
</div>
<button class="btn-start" onclick="startStudy(false)">Start Drill (${filteredCount()} cards)</button>
${gc>0?`<button class="btn-missed" onclick="startStudy(true)">Review Missed Only (${gc} cards)</button>`:""}
<div class="shortcuts"><b>Keyboard:</b> Space = flip · → = knew · ← = missed</div>
</div>`;
}

function renderStudy(el){
const card=state.deck[state.idx];const c=CC[card.cat]||CC["Risk & GRC"];
const prog=(state.idx/state.deck.length)*100;
el.innerHTML=`<div class="study">
<div class="study-header"><button class="exit" onclick="state.mode='menu';render()">✕ Exit</button><span class="counter">${state.idx+1} / ${state.deck.length}</span><div class="scores"><span class="g">✓${state.knew.size}</span><span class="r">✗${state.missed.size}</span></div></div>
<div class="progress-bar"><div class="progress-fill" style="width:${prog}%"></div></div>
<div class="badge" style="background:${c.badge}">${card.cat}</div>
<div class="card ${state.flipped?'answer':'question'}" style="${state.flipped?`background:linear-gradient(145deg,${c.bg},#fff);border-color:${c.bd}`:''}" onclick="state.flipped=!state.flipped;render()">
${!state.flipped?`<div class="q-text">${card.q}</div><div class="tap-hint">tap to reveal</div>`
:`<div class="a-label">Answer</div><div class="a-text" style="color:${c.tx}">${card.a}</div>`}
</div>
${state.flipped?`<div class="action-btns"><button class="btn-miss" onclick="handleMiss()">✗ Missed</button><button class="btn-know" onclick="handleKnow()">✓ Knew it</button></div>`:''}
</div>`;
}

function renderResults(el){
const total=state.deck.length;const kn=state.knew.size;const ms=state.missed.size;const pct=total?Math.round(kn/total*100):0;
const emoji=pct>=85?"🔥":pct>=70?"💪":"📚";
const missedCards=state.deck.filter((_,i)=>state.missed.has(CARDS.indexOf(state.deck[i])));
el.innerHTML=`<div class="results">
<div class="emoji">${emoji}</div>
<div class="pct">${pct}%</div>
<div class="summary">${kn} knew · ${ms} missed · ${total} total</div>
<div class="result-bar"><div class="fill" style="width:${pct}%"></div></div>
${ms>0?`<div class="missed-box"><div class="label">Missed cards:</div>${missedCards.map(c=>`<div class="item" style="border-color:${CC[c.cat]?.badge||'#666'}"><span class="cat">[${c.cat}]</span> ${c.q}</div>`).join("")}</div>`:''}
<div class="result-btns"><button class="btn-back" onclick="state.mode='menu';render()">Menu</button>${ms>0?`<button class="btn-retry" onclick="startStudy(true)">Drill Missed (${ms})</button>`:''}</div>
</div>`;
setTimeout(()=>{const f=document.querySelector('.result-bar .fill');if(f)f.style.width=pct+'%'},50);
}

document.addEventListener("keydown",e=>{
if(state.mode!=="study")return;
if(e.key===" "||e.key==="Enter"){e.preventDefault();state.flipped=!state.flipped;render()}
if((e.key==="ArrowRight"||e.key==="k")&&state.flipped)handleKnow();
if((e.key==="ArrowLeft"||e.key==="m")&&state.flipped)handleMiss();
});

render();
</script>
</body>
</html>
